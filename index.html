en","Unteres MN-Syndrom: schlaffe Lähmung, Muskelatrophie, Faszikulationen, Areflexie","Dezerebrierungsstarre: Läsion Vierhügelplatte → hemmende kortikoretikuläre Bahn auf FR fällt weg → exzessive Extensorenaktivierung","Brown-Séquard: halbseitige RüMa-Läsion → ipsilateral: Motorik + Tiefensensibilität; kontralateral: Schmerz + Temperatur"]},{"titel":"Muskelrezeptoren & Reflexe","punkte":["Muskelspindel: parallel zur extrafusalen Muskulatur; intrafusale Fasern; Ia-Fasern = Länge + Dehnungsgeschwindigkeit; α-γ-Koaktivierung verhindert Spindelpause bei Kontraktion","γ-Motoneurone: regulieren Spindelsensitivität; innervieren polare Spindelenden; ohne γ-MN → Spindelpause bei Kontraktion","Golgi-Sehnenorgan: IN SERIE; Ib-Fasern; misst Muskelspannung; hemmt bei Überlastung α-MN via Ib-Interneuron (verhindert Muskelruptur)","Monosynaptischer Dehnungsreflex: Ia → α-MN (gleicher Muskel) + reziproke Hemmung Antagonist via Ia-Interneuron (Glycin)","Renshaw-Zellen: rekurrente Hemmung; cholinerg. Axonkollaterale → Renshaw (glycinerg) → α-MN gehemmt; dämpft überschießende Kontraktion","Babinski-Reflex: Plantar-Extension bei Erwachsenen = Pyramidenbahnläsion (normal bei Säuglingen bis 18 Monate!)","Motorische Einheiten: Typ I (S, slow, ermüdungsresistent, oxidativ); Typ IIa (FR, mittel); Typ IIb (FF, schnell, ermüdend, glykolytisch)","ALS: 1.+2. MN degenerieren → Spastik + Atrophie + Faszikulationen GLEICHZEITIG; keine Sensorik!"]},{"titel":"Haltungsmotorik & Lokomotion","punkte":["CPG (Central Pattern Generator): spinale Rhythmusgeneratoren; alternierende Flexoren/Extensoren ohne supraspinale Führung; aktiv bei dezerebrierten Tieren auf Laufband","Posturale Reflexe (long-loop): supraspinale Schaltkreise incl. Motorkortex; antizipatorisch (vor Störung) + reaktiv (gegen Störung)","Labyrinthreflexe: absolute Kopflage im Raum → Vestibularapparat → Muskeltonusanpassung","Halsreflexe: Kopf relativ zu Rumpf → Hals-Propriozeption → Tonusanpassung","Vestibulospinale Reflexe: Ncl. Deiters NZIGE glutamaterge Struktur in Basalganglien-Schaltkreisen! Alle anderen Kerne sind GABAerg","SNc: dopaminerg; Neuromelanin → schwarz; mesostriatales System (D1 + D2 auf Striatum-MSN)","MSN (Medium Spiny Neurons): GABAerge Projektionsneurone im Striatum; viele Dornfortsätze; D1 oder D2; integrieren Kortex + Dopamin-Input","Entwicklung: Striatum + Ncl. accumbens = Telencephalon; GPi + STN + SNr = Diencephalon; SNc = Mesencephalon","ALLE Projektionsneurone der Basalganglien GABAerg → tonische Inhibition; Bewegung durch DISINHIBITION"]},{"titel":"Direkte & Indirekte Wege","punkte":["DIREKTER WEG (D1-MSN): Kortex → Striatum (D1) → GPi/SNr GEHEMMT → Thalamus DISINHIBIERT → mehr Bewegung; DA D1 → cAMP↑ → D1-MSN aktiviert","INDIREKTER WEG (D2-MSN): Kortex → Striatum (D2) → GPe gehemmt → STN enthemmt → GPi/SNr aktiviert → Thalamus GEHEMMT → weniger Bewegung; DA D2 → cAMP↓ → D2-MSN hemmt","HYPERDIREKTER WEG: Kortex → STN direkt (schnellste Bahn! Stop-Signal) → GPi/SNr aktiviert → Thalamus gehemmt","PARKINSON (DA-Mangel): D1-MSN unteraktiv + D2-MSN überaktiv → indirekter Weg↑ → Thalamus stark gehemmt → Akinese + Bradykinese + Rigor + Ruhetremor","HUNTINGTON früh: D2-MSN (indirekter Weg) degenerieren zuerst → GPe enthemmt → STN gehemmt → GPi/SNr↓ → Thalamus disinhibiert → CHOREA (Hyperkinese)","HUNTINGTON spät: auch D1-MSN → AKINESE + RIGOR (Parkinson-ähnlich)","Parkinson Frühsymptome (oft vor Motorik!): Anosmie (Braak Stadium 1-2!), REM-Schlafstörung, Obstipation, autonome Dysfunktion","Parkinson Therapie: L-Dopa + Carbidopa (Decarboxylasehemmer!); DA-Agonisten; MAO-B-Hemmer; Tiefe Hirnstimulation STN (reversibel, einstellbar)"]},{"titel":"Schleifen & Erkrankungen","punkte":["Motor-Schleife: PM/SMA → Putamen → GPi/SNr → Thalamus VL/VA → M1/PM/SMA","Limbische Schleife: Limbischer Kortex → Ncl. accumbens → Ventrales Pallidum → Thalamus MD; Motivation/Belohnung/Sucht; Dopamin aus VTA","Präfrontale Schleife: DLPFC → Ncl. caudatus → GPi/SNr → Thalamus MD → PFC; Kognition, Planung" ","emoji":"👁️","farbe":"#9b59b6","block":"ZNS","sektionen":[{"titel":"Sakkaden-Schaltung im Hirnstamm","punkte":["Fixationsreflexe = stabilisieren (VOR, OKN); Sakkaden = umstellen (neues Ziel anpeilen)","1. Exzitatorisches Burst-Signal: Burst-Neurone der PPRF (links) → Ncl. abducens ipsilateral → M. rectus lateralis links; + via Interneurone über FLM/MLF → Ncl. oculomotorius kontralateral → M. rectus medialis rechts; Ergebnis: koordinierter Blick nach links","2. Tonisches Haltungssignal: PPRF → Ncl. prepositus hypoglossi → tonische Neurone zum Ncl. abducens → hält neue Bulbusposition stabil","3. Inhibitorisches Burst-Signal: Inhibitory burst neurons der PPRF hemmen bei Blick nach links: kontralateralen M. rectus lateralis (rechts) + ipsilateralen M. rectus medialis (links) = Antagonistenrelaxation","4. Verhinderung ungewollter Sakkaden: Ncl. raphe interpositus → inhibitorische 'omnipause' Neuronen (glycinerg) hemmen kontinuierlich die exzitatorischen Burst-Neurone","Colliculus superior → kontralaterale Sakkade (projiziert auf kontralaterale PPRF → ipsilaterale Blickbewegung); Merksatz: Colliculus superior = kontralaterale Sakkade; PPRF = ipsilaterale Blickrichtung","Frontales Augenfeld (FEF, Area 8): kontralaterale Sakkade bei Stimulation (wie Colliculus superior)","MLF/FLM (Fasciculus longitudinalis medialis): koordiniert horizontale Augenbewegungen; verbindet Ncl. VI mit kontralateralem Ncl. III"]},{"titel":"Auge-Anatomie Detail (Anki)","punkte":["Iris: Hinterfläche = zweischichtiges pigmentiertes Irisepithel; vordere Epithelschicht = Myoepithelzellen → M. dilatator pupillae (sympathisch); Iris ist nicht verwachsen sondern liegt auf dem Kammerwasser","M. orbicularis oculi: schliesst Augenlider; zirkulärer Verlauf; quergestreift; N. facialis (VII)","M. levator palpebrae superioris: hebt oberes Lid (KEIN inferior!); quergestreift; N. oculomotorius (III)","M. tarsalis superior et inferior: erweitert Lidspalte; GLATTER Muskel! Sympathikus → bei Müdigkeit nimmt Sympathikus ab → Augen fallen zu = Horner!","Sclera: weisses Auge; äussere Hülle (4/5 des Bulbus); umgibt ganz hinten bis Lamina cribrosa (N. opticus-Austritt); 3 Schichten: Lamina episcleralis + Substantia propria (Kollagen I+II vernetzt) + Lamina fusca","Cornea-Schichten von außen: Epithelium anterius (unverhorntes MV-Plattenepithel; N. ciliaris longi → Corneareflex!) → Lamina limitans anterior (Bowman-Membran) → Substantia propria → Lamina limitans posterior (Descemet-Membran) → Epithelium posterius","Tränendrüse: REIN seröse Drüse; KEINE Schalt- und Streifenstücke! → Tränen sind salzig (keine NaCl-Rückresorption)","Tränenfilm-Schichten: Lipidschicht (Meibom-Drüsen, Holokrin-Talgdrüsen im Tarsus) → wässerige Schicht (Tränendrüse) → Muzinschicht (Goblet-Zellen der Konjunktiva)","Augenliddrüsen: Meibom-Drüsen (Gll. tarsales, holokrin, Talg); Zeis-Drüsen (Gll. sebacae, holokrin, bei Wimpern); Moll-Drüsen (Gll. ciliares, apokrin, muzinhaltig, bei Wimpern)","Parasympath. Tränendrüse: N. facialis → N. petrosus major → Ggl. pterygopalatinum → N. zygomaticus → N. lacrimalis"]}]},{"id":"schlaf_detail","titel":"Schlaf-Wach-Regulation (Anki)","emoji":"💤","farbe":"#27ae60","block":"ZNS","sektionen":[{"titel":"Schlafphasen & -architektur","punkte":["REM-Schlaf ähnelt im EEG dem aufmerksamen Wachzustand (Beta-/Gamma-Wellen); deshalb 'paradoxer Schlaf'","Schlaf ist ein ZYKLISCHER Vorgang; bis zu 5 Zyklen pro Nacht","Ein vollständiger NonREM-REM-Schlafzyklus dauert 90-100 Minuten","NonREM-Schlafstadien N3 (Tiefschlaf) sind prädominant am ANFANG der Nacht","REM-Schlafepisoden werden im Verlauf der Nacht LÄNGER (mehr gegen Morgen)","Körperliche Erholung: Non-REM-Schlafphasen; geistige Erholung/Gedächtniskonsolidierung: REM","Pulsrate und Atemfrequenz im REM: HÖHER als in Non-REM","Erektionen treten in REM-Schlafphasen auf","Ist REM-Anteil einer Nacht verringert → nächste Nacht ERHÖHTER REM-Anteil (REM-Rebound!)","Wachheit und Schlaf werden über die Achse Hirnstamm-Thalamus-Kortex gesteuert","Glutamatkonzentration im Thalamus nimmt beim Übergang Wach → Schlaf AB","Hirnaktivität im Tiefschlaf besonders niedrig im FRONTALEN Kortex"]}]},{"id":"basalganglien_detail","titel":"Basalganglien – Detail (Anki)","emoji":"⚙️","farbe":"#2980b9","block":"ZNS","sektionen":[{"titel":"Basalganglien Anatomie & Funktion","punkte":["Nuclei basales = anatomisch/embryologisch definierte subkortikale, telencephale Kerngebiete","Basalganglien: Teil des motorischen Systems OHNE direkte Verbindungen zum Rückenmark","Gehören zum 'extrapyramidalmotorischen System'","Ncl. accumbens: Teil des VENTRALEN Striatums; liegt zwischen Ncl. caudatus und Putamen; Basalganglienanteil des LIMBISCHEN Systems!","Substantia nigra ist Teil des Mesencephalons","Feinmotorik-Bahn aus Kleinhirn: Ncl. dentatus → über Pedunculus cerebellaris superior → Thalamus (VL) → Prämotorischer Kortex + SMA; oder über Nucleus ruber"]}]},{"id":"sehen_detail","titel":"Sehen – Optik & Verarbeitung (Anki)","emoji":"👁️","farbe":"#8e44ad","block":"Sinnesorgane","sektionen":[{"titel":"Optik & Phototransduktion","punkte":["Zapfen: enthalten eines von 3 Opsinen + Chromophor 11-cis-Retinal; Mensch hat 4 Opsin-Gene (3 Zapfen + 1 Rhodopsin)","Stäbchen sind ca. 100x empfindlicher auf Licht als Zapfen","Stäbchendichte hat Maximum bei ca. 20° parafoveal; nimmt zum Rand ab (~75%)","1:1-Verschaltung Zapfen:Bipolar nur in Fovea centralis; sonst 5-20:1","Aussenglied enthält ca. 1000 Membranscheiben/Disci mit Sehfarbstoff","On-Bipolarzellen: durch Glutamat im Dunkeln GEHEMMT (mGluR6); bei Licht: weniger Glutamat → Depolarisation","Off-Bipolarzellen: durch Glutamat im Dunkeln ERREGT (ionotrop); bei Licht: Hyperpolarisation","Horizontalzellen: laterale Inhibition unter den Photorezeptoren → Kontrastverstärkung","Starke Konvergenz: geringes Auflösungsvermögen + höhere Sensitivität; grösste RF am Rand; kleinste RF in Fovea","Additive Farbmischung: Violettblau + Orangerot = Magenta; Violettblau + Grün = Cyanblau; Orangerot + Grün = Gelb; Alle 3 = Weiss","Subtraktive Farbmischung: Magenta + Cyan = Violettblau; Gelb + Cyan = Grün; Gelb + Magenta = Orangerot; Alle 3 = Schwarz","Sehbahn: rechts auf Retina kommt = LINKS im Gesichtsfeld = zur RECHTEN Hemisphäre","Obere Gesichtsfeldhälfte: in V1 UNTERHALB der Fissura calcarina repräsentiert","CGL: linkes visuelles Feld → rechtes CGL; Schichten bleiben monookulär; Schichten 1,4,6 = kontralateral; 2,3,5 = ipsilateral"]},{"titel":"Augenentwicklung – Induktionskaskade","punkte":["Augenblässchen → induziert Linsenplakode aus Oberflächenektoderm","Linsenplakode → induziert Augenbecher (aus Augenblässchen)","Linsenblässchen → induziert Aufspaltung/Differenzierung der Cornea (3. Induktion)","Bilaterale Anordnung der Augenblässchen: durch Sonic Hedgehog (Shh)! Mutation → Zyklopie","Augenentwicklung: Augenblässchen aus Prosencephalon/Diencephalon"]}]},{"id":"vestibular_detail","titel":"Vestibularorgan – Detail (Anki)","emoji":"👂","farbe":"#3498db","block":"Sinnesorgane","sektionen":[{"titel":"Vestibular-Mechanik & Sinneszellen","punkte":["Makulaorgane erfassen Translationsbeschleunigungen PARALLEL zu ihrer Membrana propria","Bogengänge erfassen Rotationsbeschleunigungen jeweils um eine der 3 Achsen","Bogengänge: stehen 90° zueinander; lateraler Bogengang bildet 30° zur Frankfurter Horizontale","Felsenbein und Bogengänge: um 45° in der Sagittalachse verdreht","Striola: imaginäre Scheitellinie der Polarisierungsrichtung der Haarzellen","Macula utriculi: Haare polarisiert ZUR Striola hin; horizontal bei normaler Kopflage","Macula sacculi: Haare polarisiert WEG von der Striola; vertikal bei normaler Kopflage","Haarzellen im Gleichgewichtsorgan: hexagonale Bündel mit 40-100 Stereozilien + 1 randständigem Kinozilium","Haarzell-Typ I: birnenförmig; mehr Stereozilien; Calyx-Synapsen; können Reize auch ELEKTRISCH übertragen! Afferenzen aus Deiters-Kern (Ncl. vestibularis lateralis) modifizieren Reiz","Haarzell-Typ II: säulenförmig; Bouton-Synapsen; Transmitter: Glutamat (beide Typen!)","Cupula: bewegt sich verzögerungsfrei mit Bogengang; Endolymphe kommt wegen Massenträgheit nicht sofort → Relativbewegung → Cupula-Auslenkung; Cupula NICHT durch eigene Massenträgheit ausgelenkt!","Statolithenmembran: Basis bewegt sich mit; Oberfläche + Statolithen (CaCO3) bleiben durch Massenträgheit zurück → Auslenkung; Dichte der Statolithenmembran GRÖSSER als Endolymphe","Ampulla lateralis: Haarzellen utrikulopetal polarisiert; Ampullae anterior + posterior: utrikulofugal polarisiert","Vestibulorbahn: Vestibularorgan → Ggl. vestibulare → N. vestibulocochlearis → Vestibulariskerne","N. VIII zieht mit A./V. labyrinthi + N. facialis in den Meatus acusticus internus","Vestibulariskerne erhalten: vestibuläre Infos + visuelles + somatosensorisches System"]}]},{"id":"hoeren_detail","titel":"Hören – Mittelohr & Cochlea (Anki)","emoji":"🎵","farbe":"#e74c3c","block":"Sinnesorgane","sektionen":[{"titel":"Schalllehre & Pegel","punkte":["Schallintensität = Schallleistung pro Flächeneinheit; nimmt mit Distanz zur Schallquelle ab","Schalldruck, -intensität und -leistung: werden als RELATIVE Werte (Pegel) angegeben","1 Bel = 10 Dezibel (dB); Pegel = Wert relativ zu einem Referenzwert","Referenzwert Schalldruckpegel: 2×10⁻⁵ Pa = 20 μPa = nominelle absolute Hörschwelle bei 1 kHz","Referenzwert Schallintensitätspegel: 10⁻¹² W/m²; Referenzwert Schallleistungspegel: 10⁻¹² W","Schalldruckpegel-Formel: SPL [dB] = 20 × log₁₀(p/p_ref); Faktor 20 weil I ≈ p² + Dezibel statt Bel","Lautstärkepegel: subjektive Empfindung; Einheit Phon (reine Töne) oder dB(A) (A-bewertet, frequenzgewichtet)","Verhältnis SPL und Lautstärkepegel: FREQUENZABHÄNGIG (Kurven gleicher Lautstärke = Isophone)"]},{"titel":"Mittelohr – Impedanzanpassung","punkte":["Knochenleitung: ca. 40-50 dB höherer Schalldruck nötig als Luftleitung (hohe Impedanz des Knochens → viel Reflexion)","Mittelohr-Funktion: IMPEDANZANPASSUNG (nicht Verstärkung!): Luft → Perilymphe; passiver Prozess!","Impedanzanpassung durch: e; einziges Epithel mit Blutgefässen; erzeugt endocochleäres Potential + K⁺ in Endolymphe; Marginalzellen = Trennwand Endolymphe/Interstitium; Basalzellen = Trennwand Interstitium/Lig. spirale","Haarzellen brauchen keine lokale Blutversorgung dank der Stria vascularis (niedrig metabolisches Profil möglich)","Audiometrie: absolute Audiometrie (absolute Hörschwelle in dB oder Phon) vs. klinische Schwellenaudiometrie (Vergleich mit Referenzpopulation)"]}]},{"id":"gleichgewicht_detail","titel":"Gleichgewichtssinn – Detail (Anki)","emoji":"⚖️","farbe":"#e67e22","block":"Sinnesorgane","sektionen":[{"titel":"Physik des Gleichgewichts","punkte":["Gleichgewichtssinn = Zusammenwirken: Vestibularapparat (primär) + propriozeptive Rezeptoren + Augen","6 Freiheitsgrade im 3D-Raum: Translation entlang 3 Achsen + Rotation um 3 Achsen","Translationsbeschleunigung: gemessen durch Makulaorgane (+ auch Gravitation erfasst!)","Rotationsbeschleunigung: v.a. durch Bogengangsorgane (Makulaorgane können auch Rotation wahrnehmen!)","Makulaorgane können GLEICHZEITIG Translationsbeschleunigung + Schwerkraft + Zentrifugalkraft erfassen","Bogengang-Aktivierung → korrespondierender Bogengang auf Gegenseite wird gleichzeitig GEHEMMT (Hyperpolarisation)"]}]},{"id":"riechen_detail","titel":"Riechen & Geschmack (Anki)","emoji":"👃","farbe":"#c0392b","block":"Sinnesorgane","sektionen":[{"titel":"Olfaktorisches System","punkte":["Makrosmaten (z.B. Hund): 20-44x empfindlichere Geruchswahrnehmung als Mensch","Riechsinneszellen: neuroektodermaler Herkunft","Axone der Riechsinneszellen → Bündel (Fila olfactoria) → durch Lamina cribrosa → N. olfactorius → Bulbus olfactorius ('Riechkolben')","Olfaktorisches System ist mit dem LIMBISCHEN System verbunden","Riechbahn: EINZIGE sensible Bahn OHNE primären Thalamus-Durchgang → direkt limbisches System"]}]},{"id":"haut_detail","titel":"Haut – Detail (Anki)","emoji":"🧴","farbe":"#e8a838","block":"Sinnesorgane","sektionen":[{"titel":"Haut-Fakten aus Anki","punkte":[" function showDetail(t){
  setActive('btn-ue');
  let aktSek=null;
  let suche='';
  const qAnz=FQ.filter(f=>f.k===t.id).length;
  function render(){
    wrap().innerHTML=`
    <button class="btn" onclick="showUebersicht()" style="margin-bottom:14px">← Zurück</button>
    <div style="display:flex;align-items:center;gap:10px;margin:14px 0 4px">
      <span style="font-size:26px">${t.emoji}</span>
      <div>
        <h2 style="font-size:19px;color:${t.farbe}">${t.titel}</h2>
        <div style="font-size:11px;color:#777">${t.block} · ${t.sektionen.reduce((a,s)=>a+s.punkte.length,0)} Kernpunkte</div>
      </div>
    </div>
    <div class="filter-row">
      <button class="btn${aktSek===null?' active':''}" onclick="setSek(null)">Alle</button>
      ${t.sektionen.map((s,i)=>`<button class="btn${aktSek===i?' active':''}" onclick="setSek(${i})">${s.titel}</button>`).join('')}
    </div>
    <input id="search" placeholder="🔍 Suchbegriff eingeben..." value="${suche}" oninput="setSuche(this.value)"/>
    <div id="punkte-container"></div>
    <div style="margin-top:18px;padding:13px 15px;background:rgba(46,204,113,0.05);border:1px solid rgba(46,204,113,0.2);border-radius:9px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:#2ecc71">🎯 ${qAnz} Quizfragen zu diesem Thema</span>
      <button class="btn" style="background:#1a3a22;border-color:rgba(46,204,113,0.3);color:#2ecc71" onclick="startThemaQuiz('${t.id}',${qAnz})">Quiz starten →</button>
    </div>`;
    renderPunkte();
  }
  function renderPunkte(){
    const c=$('#punkte-container');
    if(!c) return;
    c.innerHTML='';
    const seks = aktSek===null ? t.sektionen : [t.sektionen[aktSek]];
    seks.forEach(sek=>{
      const pkt = suche ? sek.punkte.filter(p=>p.toLowerCase().includes(suche.toLowerCase())) : sek.punkte;
      if(pkt.length===0) return;
      const sec=el('div');
      sec.style.marginBottom='20px';
      const hdr=el('div','sek-titel');
      hdr.style.cssText=`color:${t.farbe};border-bottom-color:${t.farbe}22`;
      hdr.textContent=sek.titel+' ('+pkt.length+' Punkte)';
      sec.appendChild(hdr);
      pkt.forEach((p,pi)=>{
        const d=el('div','punkt');
        d.style.borderLeftColor=t.farbe+'50';
        const nr=el('span','punkt-nr');
        nr.style.color=t.farbe;
        nr.textContent=String(pi+1).padStart(2,'0');
        const txt=el('span','punkt-text');
        if(suche){
          const lo=p.toLowerCase();
          const idx=lo.indexOf(suche.toLowerCase());
          txt.innerHTML=p.slice(0,idx)+'<mark style="background:'+t.farbe+'30;color:'+t.farbe+'">'+p.slice(idx,idx+suche.length)+'</mark>'+p.slice(idx+suche.length);
        } else {
          txt.textContent=p;
        }
        d.appendChild(nr); d.appendChild(txt);
        sec.appendChild(d);
      });
      c.appendChild(sec);
    });
  }
  window.setSek=function(i){aktSek=i;renderPunkte();document.querySelectorAll('.filter-row .btn').forEach((b,bi)=>{b.classList.toggle('active',bi===0?(i===null):bi-1===i)})};
  window.setSuche=function(s){suche=s;renderPunkte()};
  render();
}

      <div class="filter-row" id="anz-row"></div>
    </div>
    <button onclick="startQuiz()" style="width:100%;background:linear-gradient(135deg,#1a3a22,#0d2215);border:1px solid rgba(46,204,113,0.3);border-radius:10px;padding:13px;color:#2ecc71;font-size:15px;letter-spacing:0.06em;font-family:inherit">Quiz starten → ${anz} Fragen</button>`;
    const katRow=$('#kat-row');
    const opts=[
      {id:'alle',label:`🔀 Alle (${FQ.length})`},
      {id:'ZNS',label:`🧠 ZNS (${FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='ZNS').length})`},
      {id:'Sinnesorgane',label:`👁️ Sinnesorgane (${FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='Sinnesorgane').length})`},
      ...TH.map(t=>({id:t.id,label:`${t.emoji} ${t.titel} (${FQ.filter(f=>f.k===t.id).length})`}))
    ];
    opts.forEach(o=>{
      const b=el('button','btn'+(kat===o.id?' active':''),o.label);
      b.onclick=()=>{kat=o.id;anz=Math.min(anz,getPool(o.id).length);render()};
      katRow.appendChild(b);
    });
    const anzRow=$('#anz-row');
    [10,15,20,25,30,40,'Alle'].forEach(n=>{
      const val=n==='Alle'?maxAnz:Math.min(Number(n),maxAnz);
      const b=el('button','btn'+(anz===val?' active':''),n==='Alle'?`Alle (${maxAnz})`:String(n));
      b.onclick=()=>{anz=val;render()};
      anzRow.appendChild(b);
    });
    quizState.kat=kat; quizState.anz=anz;
  }
  render();
}

function startQuiz(){
  setActive('btn-qu');
  const {kat,anz}=quizState;
  let pool;
  if(kat==='alle') pool=FQ;
  else if(kat==='ZNS') pool=FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='ZNS');
  else if(kat==='Sinnesorgane') pool=FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='Sinnesorgane');
  else pool=FQ.filter(f=>f.k===kat);
  quizState.fragen=shuffle(pool).slice(0,Math.min(anz,pool.length));
  quizState.idx=0; quizState.gew=null; quizState.punkte=0; quizState.verlauf=[];
  showFrage();
}

function showFrage(){
  const {fragen,idx,gew,punkte}=quizState;
  if(idx>=fragen.length){showErgebnis();return;}
  const f=fragen[idx];
  const t=TH.find(th=>th.id===f.k);
  const proz=Math.round((idx/fragen.length)*100);
  wrap().innerHTML=`
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px">
        <span style="color:#777">Frage ${idx+1} / ${fragen.length}</span>
        <span style="color:#2ecc71">✓ ${punkte} richtig</span>
      </div>
      <div class="progress"><div class="progress-fill" style="width:${proz}%"></div></div>
      ${t?`<div style="font-size:10px;color:${t.farbe};margin-bottom:10px">${t.emoji} ${t.titel} · ${t.block}</div>`:''}
    </div>
    <div class="card" style="margin-bottom:11px">
      <div style="font-size:10px;color:#777;letter-spacing:0.1em;margin-bottom:8px;text-transform:uppercase">Frage</div>
      <p style="font-size:14px;line-height:1.65">${f.f}</p>
    </div>
    <div id="optionen"></div>
    <div id="weiter-btn" style="display:none;margin-top:12px;text-align:right">
      <button onclick="naechste()" style="background:linear-gradient(135deg,#1a2a3a,#0d1820);border:1px solid rgba(108,158,248,0.3);color:#6c9ef8;border-radius:9px;padding:10px 22px;font-size:13px;letter-spacing:0.05em;font-family:inherit">
        ${idx+1>=fragen.length?'Auswertung →':'Nächste →'}
      </button>
    </div>`;
  const opts=$('#optionen');
  f.a.forEach((ans,i)=>{
    const d=el('div','q-opt');
    if(gew!==null){
      if(i===f.r) d.classList.add('richtig');
      else if(i===gew) d.classList.add('falsch');
      else d.classList.add('neutral');
    }
    const letter=el('span','q-letter');
    if(gew!==null){
      letter.textContent=i===f.r?'✓':i===gew?'✗':String.fromCharCode(65+i);
      letter.style.color=i===f.r?'#2ecc71':i===gew?'#e74c3c':'#555';
    } else {
      letter.textContent=String.fromCharCode(65+i);
      letter.style.color='#777';
    }
    const txt=el('span','q-text');
    txt.textContent=ans;
    d.appendChild(letter); d.appendChild(txt);
    if(gew===null) d.onclick=()=>waehle(i);
    opts.appendChild(d);
  });
}

function waehle(i){
  const f=quizState.fragen[quizState.idx];
  quizState.gew=i;
  if(i===f.r) quizState.punkte++;
  quizState.verlauf.push(i);
  showFrage();
  $('#weiter-btn').style.display='block';
}

function naechste(){
  quizState.idx++; quizState.gew=null;
  showFrage();
}

function showErgebnis(){
  const {fragen,punkte,verlauf}=quizState;
  const proz=Math.round((punkte/fragen.length)*100);
  const emoji=proz>=80?'🏆':proz>=60?'👍':'📖';
  const col=proz>=80?'#2ecc71':proz>=60?'#f1c40f':'#e74c3c';
  wrap().innerHTML=`
    <div style="text-align:center;padding:28px 0 22px">
      <div style="font-size:48px;margin-bottom:12px">${emoji}</div>
      <h2 style="font-size:22px;margin-bottom:6px">Quiz beendet!</h2>
      <p style="color:#777;margin-bottom:20px">${punkte} von ${fragen.length} richtig</p>
      <div style="display:inline-block;background:${col}18;border:2px solid ${col};border-radius:12px;padding:12px 28px;margin-bottom:24px">
        <div style="font-size:36px;font-weight:bold;color:${col}">${proz}%</div>
        <div style="font-size:11px;color:#777">${proz>=80?'Ausgezeichnet!':proz>=60?'Gut – weiterüben!':'Nochmal Übersicht anschauen'}</div>
      </div>
    </div>
    <div style="margin-bottom:20px">
      <h3 style="font-size:14px;margin-bottom:10px;color:#c8b090">Alle Fragen & korrekte Antworten:</h3>
      ${fragen.map((f,i)=>{
        const t=TH.find(th=>th.id===f.k);
        const ok=verlauf[i]===f.r;
        return `<div class="erg-card" style="border-left-color:${ok?'#2ecc71':'#e74c3c'}">
          <div style="font-size:10px;color:#777;margin-bottom:2px">${t?t.emoji+' '+t.titel:f.k} · Frage ${i+1}</div>
          <div style="font-size:12px;margin-bottom:4px">${f.f}</div>
          <div style="font-size:11px;color:#2ecc71">✓ ${f.a[f.r]}</div>
          ${!ok?`<div style="font-size:11px;color:#e74c3c">✗ Gewählt: ${f.a[verlauf[i]]}</div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
      <button class="btn" onclick="showQuizSetup()">⚙️ Neues Quiz</button>
      <button class="btn" style="background:#1a3a22;border-color:rgba(46,204,113,0.3);color:#2ecc71" onclick="startQuiz()">🔄 Nochmal</button>
      <button class="btn" onclick="showHome()">🏠 Home</button>
    </div>`;
}

showHome();
</script>
</body>
</html>
