function showDetail(t){
  setActive('btn-ue');
  let aktSek=null;
  let suche='';
  const qAnz=FQ.filter(f=>f.k===t.id).length;
  function render(){
    wrap().innerHTML=`
    <button class="btn" onclick="showUebersicht()" style="margin-bottom:14px">← Zurück</button>
    <div style="display:flex;align-items:center;gap:10px;margin:14px 0 4px">
      <span style="font-size:26px">${t.emoji}</span>
      <div>
        <h2 style="font-size:19px;color:${t.farbe}">${t.titel}</h2>
        <div style="font-size:11px;color:#777">${t.block} · ${t.sektionen.reduce((a,s)=>a+s.punkte.length,0)} Kernpunkte</div>
      </div>
    </div>
    <div class="filter-row">
      <button class="btn${aktSek===null?' active':''}" onclick="setSek(null)">Alle</button>
      ${t.sektionen.map((s,i)=>`<button class="btn${aktSek===i?' active':''}" onclick="setSek(${i})">${s.titel}</button>`).join('')}
    </div>
    <input id="search" placeholder="🔍 Suchbegriff eingeben..." value="${suche}" oninput="setSuche(this.value)"/>
    <div id="punkte-container"></div>
    <div style="margin-top:18px;padding:13px 15px;background:rgba(46,204,113,0.05);border:1px solid rgba(46,204,113,0.2);border-radius:9px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:#2ecc71">🎯 ${qAnz} Quizfragen zu diesem Thema</span>
      <button class="btn" style="background:#1a3a22;border-color:rgba(46,204,113,0.3);color:#2ecc71" onclick="startThemaQuiz('${t.id}',${qAnz})">Quiz starten →</button>
    </div>`;
    renderPunkte();
  }
  function renderPunkte(){
    const c=$('#punkte-container');
    if(!c) return;
    c.innerHTML='';
    const seks = aktSek===null ? t.sektionen : [t.sektionen[aktSek]];
    seks.forEach(sek=>{
      const pkt = suche ? sek.punkte.filter(p=>p.toLowerCase().includes(suche.toLowerCase())) : sek.punkte;
      if(pkt.length===0) return;
      const sec=el('div');
      sec.style.marginBottom='20px';
      const hdr=el('div','sek-titel');
      hdr.style.cssText=`color:${t.farbe};border-bottom-color:${t.farbe}22`;
      hdr.textContent=sek.titel+' ('+pkt.length+' Punkte)';
      sec.appendChild(hdr);
      pkt.forEach((p,pi)=>{
        const d=el('div','punkt');
        d.style.borderLeftColor=t.farbe+'50';
        const nr=el('span','punkt-nr');
        nr.style.color=t.farbe;
        nr.textContent=String(pi+1).padStart(2,'0');
        const txt=el('span','punkt-text');
        if(suche){
          const lo=p.toLowerCase();
          const idx=lo.indexOf(suche.toLowerCase());
          txt.innerHTML=p.slice(0,idx)+'<mark style="background:'+t.farbe+'30;color:'+t.farbe+'">'+p.slice(idx,idx+suche.length)+'</mark>'+p.slice(idx+suche.length);
        } else {
          txt.textContent=p;
        }
        d.appendChild(nr); d.appendChild(txt);
        sec.appendChild(d);
      });
      c.appendChild(sec);
    });
  }
  window.setSek=function(i){aktSek=i;renderPunkte();document.querySelectorAll('.filter-row .btn').forEach((b,bi)=>{b.classList.toggle('active',bi===0?(i===null):bi-1===i)})};
  window.setSuche=function(s){suche=s;renderPunkte()};
  render();
}

window.startThemaQuiz=function(id,anz){
  quizState.kat=id; quizState.anz=anz; startQuiz();
};

function showQuizSetup(){
  setActive('btn-qu');
  let kat='alle';
  let anz=20;
  function getPool(k){
    if(k==='alle') return FQ;
    if(k==='ZNS') return FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='ZNS');
    if(k==='Sinnesorgane') return FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='Sinnesorgane');
    return FQ.filter(f=>f.k===k);
  }
  function render(){
    const pool=getPool(kat);
    const maxAnz=pool.length;
    if(anz>maxAnz) anz=maxAnz;
    wrap().innerHTML=`
    <h2 style="font-size:17px;margin-bottom:18px;color:#c8b090">🎯 Quiz konfigurieren</h2>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:11px;color:#777;margin-bottom:9px;letter-spacing:0.08em;text-transform:uppercase">Kategorie</div>
      <div class="filter-row" id="kat-row"></div>
    </div>
    <div class="card" style="margin-bottom:18px">
      <div style="font-size:11px;color:#777;margin-bottom:9px;letter-spacing:0.08em;text-transform:uppercase">Anzahl (max. ${maxAnz})</div>
      <div class="filter-row" id="anz-row"></div>
    </div>
    <button onclick="startQuiz()" style="width:100%;background:linear-gradient(135deg,#1a3a22,#0d2215);border:1px solid rgba(46,204,113,0.3);border-radius:10px;padding:13px;color:#2ecc71;font-size:15px;letter-spacing:0.06em;font-family:inherit">Quiz starten → ${anz} Fragen</button>`;
    const katRow=$('#kat-row');
    const opts=[
      {id:'alle',label:`🔀 Alle (${FQ.length})`},
      {id:'ZNS',label:`🧠 ZNS (${FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='ZNS').length})`},
      {id:'Sinnesorgane',label:`👁️ Sinnesorgane (${FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='Sinnesorgane').length})`},
      ...TH.map(t=>({id:t.id,label:`${t.emoji} ${t.titel} (${FQ.filter(f=>f.k===t.id).length})`}))
    ];
    opts.forEach(o=>{
      const b=el('button','btn'+(kat===o.id?' active':''),o.label);
      b.onclick=()=>{kat=o.id;anz=Math.min(anz,getPool(o.id).length);render()};
      katRow.appendChild(b);
    });
    const anzRow=$('#anz-row');
    [10,15,20,25,30,40,'Alle'].forEach(n=>{
      const val=n==='Alle'?maxAnz:Math.min(Number(n),maxAnz);
      const b=el('button','btn'+(anz===val?' active':''),n==='Alle'?`Alle (${maxAnz})`:String(n));
      b.onclick=()=>{anz=val;render()};
      anzRow.appendChild(b);
    });
    quizState.kat=kat; quizState.anz=anz;
  }
  render();
}

function startQuiz(){
  setActive('btn-qu');
  const {kat,anz}=quizState;
  let pool;
  if(kat==='alle') pool=FQ;
  else if(kat==='ZNS') pool=FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='ZNS');
  else if(kat==='Sinnesorgane') pool=FQ.filter(f=>TH.find(t=>t.id===f.k)?.block==='Sinnesorgane');
  else pool=FQ.filter(f=>f.k===kat);
  quizState.fragen=shuffle(pool).slice(0,Math.min(anz,pool.length));
  quizState.idx=0; quizState.gew=null; quizState.punkte=0; quizState.verlauf=[];
  showFrage();
}

function showFrage(){
  const {fragen,idx,gew,punkte}=quizState;
  if(idx>=fragen.length){showErgebnis();return;}
  const f=fragen[idx];
  const t=TH.find(th=>th.id===f.k);
  const proz=Math.round((idx/fragen.length)*100);
  wrap().innerHTML=`
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px">
        <span style="color:#777">Frage ${idx+1} / ${fragen.length}</span>
        <span style="color:#2ecc71">✓ ${punkte} richtig</span>
      </div>
      <div class="progress"><div class="progress-fill" style="width:${proz}%"></div></div>
      ${t?`<div style="font-size:10px;color:${t.farbe};margin-bottom:10px">${t.emoji} ${t.titel} · ${t.block}</div>`:''}
    </div>
    <div class="card" style="margin-bottom:11px">
      <div style="font-size:10px;color:#777;letter-spacing:0.1em;margin-bottom:8px;text-transform:uppercase">Frage</div>
      <p style="font-size:14px;line-height:1.65">${f.f}</p>
    </div>
    <div id="optionen"></div>
    <div id="weiter-btn" style="display:none;margin-top:12px;text-align:right">
      <button onclick="naechste()" style="background:linear-gradient(135deg,#1a2a3a,#0d1820);border:1px solid rgba(108,158,248,0.3);color:#6c9ef8;border-radius:9px;padding:10px 22px;font-size:13px;letter-spacing:0.05em;font-family:inherit">
        ${idx+1>=fragen.length?'Auswertung →':'Nächste →'}
      </button>
    </div>`;
  const opts=$('#optionen');
  f.a.forEach((ans,i)=>{
    const d=el('div','q-opt');
    if(gew!==null){
      if(i===f.r) d.classList.add('richtig');
      else if(i===gew) d.classList.add('falsch');
      else d.classList.add('neutral');
    }
    const letter=el('span','q-letter');
    if(gew!==null){
      letter.textContent=i===f.r?'✓':i===gew?'✗':String.fromCharCode(65+i);
      letter.style.color=i===f.r?'#2ecc71':i===gew?'#e74c3c':'#555';
    } else {
      letter.textContent=String.fromCharCode(65+i);
      letter.style.color='#777';
    }
    const txt=el('span','q-text');
    txt.textContent=ans;
    d.appendChild(letter); d.appendChild(txt);
    if(gew===null) d.onclick=()=>waehle(i);
    opts.appendChild(d);
  });
}

function waehle(i){
  const f=quizState.fragen[quizState.idx];
  quizState.gew=i;
  if(i===f.r) quizState.punkte++;
  quizState.verlauf.push(i);
  showFrage();
  $('#weiter-btn').style.display='block';
}

function naechste(){
  quizState.idx++; quizState.gew=null;
  showFrage();
}

function showErgebnis(){
  const {fragen,punkte,verlauf}=quizState;
  const proz=Math.round((punkte/fragen.length)*100);
  const emoji=proz>=80?'🏆':proz>=60?'👍':'📖';
  const col=proz>=80?'#2ecc71':proz>=60?'#f1c40f':'#e74c3c';
  wrap().innerHTML=`
    <div style="text-align:center;padding:28px 0 22px">
      <div style="font-size:48px;margin-bottom:12px">${emoji}</div>
      <h2 style="font-size:22px;margin-bottom:6px">Quiz beendet!</h2>
      <p style="color:#777;margin-bottom:20px">${punkte} von ${fragen.length} richtig</p>
      <div style="display:inline-block;background:${col}18;border:2px solid ${col};border-radius:12px;padding:12px 28px;margin-bottom:24px">
        <div style="font-size:36px;font-weight:bold;color:${col}">${proz}%</div>
        <div style="font-size:11px;color:#777">${proz>=80?'Ausgezeichnet!':proz>=60?'Gut – weiterüben!':'Nochmal Übersicht anschauen'}</div>
      </div>
    </div>
    <div style="margin-bottom:20px">
      <h3 style="font-size:14px;margin-bottom:10px;color:#c8b090">Alle Fragen & korrekte Antworten:</h3>
      ${fragen.map((f,i)=>{
        const t=TH.find(th=>th.id===f.k);
        const ok=verlauf[i]===f.r;
        return `<div class="erg-card" style="border-left-color:${ok?'#2ecc71':'#e74c3c'}">
          <div style="font-size:10px;color:#777;margin-bottom:2px">${t?t.emoji+' '+t.titel:f.k} · Frage ${i+1}</div>
          <div style="font-size:12px;margin-bottom:4px">${f.f}</div>
          <div style="font-size:11px;color:#2ecc71">✓ ${f.a[f.r]}</div>
          ${!ok?`<div style="font-size:11px;color:#e74c3c">✗ Gewählt: ${f.a[verlauf[i]]}</div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
      <button class="btn" onclick="showQuizSetup()">⚙️ Neues Quiz</button>

      <button class="btn" onclick="showHome()">🏠 Home</button>
    </div>`;
}

showHome();
</script>
