en","Unteres MN-Syndrom: schlaffe Lähmung, Muskelatrophie, Faszikulationen, Areflexie","Dezerebrierungsstarre: Läsion Vierhügelplatte → hemmende kortikoretikuläre Bahn auf FR fällt weg → exzessive Extensorenaktivierung","Brown-Séquard: halbseitige RüMa-Läsion → ipsilateral: Motorik + Tiefensensibilität; kontralateral: Schmerz + Temperatur"]},{"titel":"Muskelrezeptoren & Reflexe","punkte":["Muskelspindel: parallel zur extrafusalen Muskulatur; intrafusale Fasern; Ia-Fasern = Länge + Dehnungsgeschwindigkeit; α-γ-Koaktivierung verhindert Spindelpause bei Kontraktion","γ-Motoneurone: regulieren Spindelsensitivität; innervieren polare Spindelenden; ohne γ-MN → Spindelpause bei Kontraktion","Golgi-Sehnenorgan: IN SERIE; Ib-Fasern; misst Muskelspannung; hemmt bei Überlastung α-MN via Ib-Interneuron (verhindert Muskelruptur)","Monosynaptischer Dehnungsreflex: Ia → α-MN (gleicher Muskel) + reziproke Hemmung Antagonist via Ia-Interneuron (Glycin)","Renshaw-Zellen: rekurrente Hemmung; cholinerg. Axonkollaterale → Renshaw (glycinerg) → α-MN gehemmt; dämpft überschießende Kontraktion","Babinski-Reflex: Plantar-Extension bei Erwachsenen = Pyramidenbahnläsion (normal bei Säuglingen bis 18 Monate!)","Motorische Einheiten: Typ I (S, slow, ermüdungsresistent, oxidativ); Typ IIa (FR, mittel); Typ IIb (FF, schnell, ermüdend, glykolytisch)","ALS: 1.+2. MN degenerieren → Spastik + Atrophie + Faszikulationen GLEICHZEITIG; keine Sensorik!"]},{"titel":"Haltungsmotorik & Lokomotion","punkte":["CPG (Central Pattern Generator): spinale Rhythmusgeneratoren; alternierende Flexoren/Extensoren ohne supraspinale Führung; aktiv bei dezerebrierten Tieren auf Laufband","Posturale Reflexe (long-loop): supraspinale Schaltkreise incl. Motorkortex; antizipatorisch (vor Störung) + reaktiv (gegen Störung)","Labyrinthreflexe: absolute Kopflage im Raum → Vestibularapparat → Muskeltonusanpassung","Halsreflexe: Kopf relativ zu Rumpf → Hals-Propriozeption → Tonusanpassung","Vestibulospinale Reflexe: Ncl. Deiters NZIGE glutamaterge Struktur in Basalganglien-Schaltkreisen! Alle anderen Kerne sind GABAerg","SNc: dopaminerg; Neuromelanin → schwarz; mesostriatales System (D1 + D2 auf Striatum-MSN)","MSN (Medium Spiny Neurons): GABAerge Projektionsneurone im Striatum; viele Dornfortsätze; D1 oder D2; integrieren Kortex + Dopamin-Input","Entwicklung: Striatum + Ncl. accumbens = Telencephalon; GPi + STN + SNr = Diencephalon; SNc = Mesencephalon","ALLE Projektionsneurone der Basalganglien GABAerg → tonische Inhibition; Bewegung durch DISINHIBITION"]},{"titel":"Direkte & Indirekte Wege","punkte":["DIREKTER WEG (D1-MSN): Kortex → Striatum (D1) → GPi/SNr GEHEMMT → Thalamus DISINHIBIERT → mehr Bewegung; DA D1 → cAMP↑ → D1-MSN aktiviert","INDIREKTER WEG (D2-MSN): Kortex → Striatum (D2) → GPe gehemmt → STN enthemmt → GPi/SNr aktiviert → Thalamus GEHEMMT → weniger Bewegung; DA D2 → cAMP↓ → D2-MSN hemmt","HYPERDIREKTER WEG: Kortex → STN direkt (schnellste Bahn! Stop-Signal) → GPi/SNr aktiviert → Thalamus gehemmt","PARKINSON (DA-Mangel): D1-MSN unteraktiv + D2-MSN überaktiv → indirekter Weg↑ → Thalamus stark gehemmt → Akinese + Bradykinese + Rigor + Ruhetremor","HUNTINGTON früh: D2-MSN (indirekter Weg) degenerieren zuerst → GPe enthemmt → STN gehemmt → GPi/SNr↓ → Thalamus disinhibiert → CHOREA (Hyperkinese)","HUNTINGTON spät: auch D1-MSN → AKINESE + RIGOR (Parkinson-ähnlich)","Parkinson Frühsymptome (oft vor Motorik!): Anosmie (Braak Stadium 1-2!), REM-Schlafstörung, Obstipation, autonome Dysfunktion","Parkinson Therapie: L-Dopa + Carbidopa (Decarboxylasehemmer!); DA-Agonisten; MAO-B-Hemmer; Tiefe Hirnstimulation STN (reversibel, einstellbar)"]},{"titel":"Schleifen & Erkrankungen","punkte":["Motor-Schleife: PM/SMA → Putamen → GPi/SNr → Thalamus VL/VA → M1/PM/SMA","Limbische Schleife: Limbischer Kortex → Ncl. accumbens → Ventrales Pallidum → Thalamus MD; Motivation/Belohnung/Sucht; Dopamin aus VTA","Präfrontale Schleife: DLPFC → Ncl. caudatus → GPi/SNr → Thalamus MD → PFC; Kognition, Planung" fferenz vom kranken Auge); typisch für Optikusneuritis bei MS!","Efferente Störung: krankes Auge bewegt sich nicht","Nur das kranke Auge reagiert abweichend"],"r":1},{"k":"auge_anatomie","f":"Glaukom: Pathomechanismus + typischer Gesichtsfeldausfall?","a":["Linseneintrübung → zentrale Blendung","Abflussbehinderung Kammerwasser → IOP↑ → N. opticus-Kompression → PERIPHERE Gesichtsfeldausfälle ZUERST! ('Röhrengesichtsfeld' im Endstadium)","Makuladegeneration → zentraler Skotom","Netzhautthrombose → sektorförmig"],"r":1},{"k":"auge_anatomie","f":"Dorsaler visueller Pfad (Wo?): wohin und welche Funktion?","a":["V1 → IT → Objekterkennung + Farbe","V1 → MT/V5 → parietaler Kortex; Bewegung, Tiefenwahrnehmung, Navigation, räumliche Orientierung; Läsion → Neglect oder Balint-Syndrom","V1 → Amygdala → Angst","V1 → Hippocampus → Gedächtnis"],"r":1},{"k":"augenentwicklung","f":"Pax6: ektopische Expression kann was bewirken?","a":["Augen verkleinern (heterozygote Mutation)","Augen an atypischen Orten (z.B. Bein der Fruchtfliege!) erzeugen = definitives Mastergen für Augenentwicklung!","Pigmentverlust","Netzhautdegeneration"],"r":1},{"k":"augenentwicklung","f":"Sakkaden-Steuerung horizontal: Schlüsselstruktur im Hirnstamm?","a":["riMLF im Mesencephalon (vertikal)","PPRF (paramediane pontine FR) + Ncl. abducens; Omnipause-Neurone = Bremse; FEF (Area 8) + Colliculus superior steuern PPRF","FEF allein","Kleinhirn direkt"],"r":1},{"k":"augenentwicklung","f":"VOR: Latenz und wann fällt er aus?","a":["200ms; bei Zerebellumläsion","<10ms (kürzeste Hirnstammreflexlatenz!); Ausfall NUR bei Hirntod; robust gegen andere Läsionen","50ms; bei Pons-Läsion","500ms; bei Kortexläsion"],"r":1},{"k":"augenentwicklung","f":"INO: welche Konvergenz-Eigenschaft?","a":["Konvergenz auch ausgefallen (N.III-Kern betroffen)","KONVERGENZ ERHALTEN! (läuft über anderen Weg, nicht via MLF) → wichtiges DD-Kriterium","Konvergenz hyperaktiv","Konvergenz nur einseitig erhalten"],"r":1},{"k":"augenentwicklung","f":"N lymphe)","Aus ENDOLYMPHE (K+-reich, 150 mM!) → großer elektrochemischer Gradient → schnelle Depolarisation der Haarzelle!","Direkt aus Blut via Stria vascularis"],"r":2},{"k":"vestibular","f":"Morbus Menière: klassische Trias + Pathomechanismus?","a":["Presbyakusis + Tinnitus + Nystagmus","Endolymphatischer Hydrops → Anfälle: Vertigo (plötzlich drehend!) + Tinnitus (einseitig, tieffrequent!) + Hörminderung (fluktuierend!)","Einseitiger Hörausfall + Tinnitus + Kopfschmerz","Bilateraler Tinnitus + Gleichgewichtsstörung + Demenz"],"r":1},{"k":"vestibular","f":"Stapediusreflex: warum ist er auch beim EIGENEN Sprechen aktiv?","a":["Nur bei fremden Stimmen","Aktiviert VOR dem eigenen Sprechen (antizipatorisch) um das eigene Innenohr vor dem lauten Sprechen zu schützen; Reflex: ab ~70-90 dB; via N.VII","Nur bei Musik","Nur auf einer Seite"],"r":1},{"k":"vestibular","f":"Presbyakusis: welche Frequenzen sind ZUERST betroffen?","a":["Tiefe Frequenzen (<250 Hz)","Mittlere Frequenzen (1-2 kHz, Sprache)","HOHE Frequenzen ZUERST! (Basis der Cochlea altert früher; Hochtonsenke im Audiogramm)","Alle Frequenzen gleichmäßig"],"r":2},{"k":"motorik","f":"Welches Areal löst bei elektrischer Reizung komplexe Bimanualkoordination aus?","a":["Primärmotorkortex M1","Supplementär-motorischer Kortex SMA","Prämotorkortex PM","Broca-Areal"],"r":1},{"k":"motorik","f":"Was ist das Bereitschaftspotential (Readiness Potential)?","a":["Reflex-Antwort auf sensorischen Stimulus","Langsame negative EEG-Welle, die ~800ms VOR einer Willkürbewegung im SMA einsetzt; zeigt Bewegungsvorbereitung","Postsynaptisches Potential nach α-MN-Feuerung","Delta-Welle im Schlaf"],"r":1},{"k":"motorik","f":"Tractus corticospinalis anterior (ventralis): Eigenschaften?","a":["Kreuzt in Decussatio pyramidum; laterales System","Ipsilateral im Vorderstrang; kreuzt erst segmental; innerviert Rumpfmuskulatur (mediales System)","Geht nur zum Kleinhirn","Leitet Sensibilität"],"r":1},{"k":"motorik","f":"Warum kommt es bei einseitiger Kortexläsion nicht zur Rumpflähmung?","a":["Rumpf wird gar nicht kortikal innerviert","Mediales System = bilateral → Rumpf hat ipsilaterale + kontralaterale kortikale Versorgung; bei einseitiger Läsion übernimmt Gegenseite","Rückenmark kompensiert automatisch","Zerebellum übernimmt Rumpfkontrolle"],"r":1},{"k":"motorik","f":"Was ist der Unterschied zwischen Haltungsmotorik und Zielmotorik?","a":["Identisch; nur Geschwindigkeit unterschiedlich","Haltungsmotorik: Extensoren, proximal, tonisch, bilateral, Hirnstamm; Zielmotorik: Flexoren, distal, phasisch, unilateral, Kortex direkt","Beide über Pyramidenbahn","Haltungsmotorik = willkürlich; Zielmotorik = reflexiv"],"r":1},{"k":"motorik","f":"Formatio reticularis: motorische Funktion?","a":["Nur sensorische Verarbeitung","Tractus reticulospinalis medialis (pontine FR) = aktiviert Extensoren; Tractus reticulospinalis lateralis (medulläre FR) = hemmt Extensoren, aktiviert Flexoren","Nur vegetative Funktionen","Schaltstation für Basalganglien"],"r":1},{"k":"motorik","f":"Was passiert bei isolierter Läsion des prämotorischen Kortex?","a":["Komplette kontralaterale Hemiplegie","Störung der Bewegungsinitiierung und Körperhaltungsvorbereitung; keine komplette Lähmung (M1 intakt)","Nur Sensibilitätsstörung","Kleinhirnataxie"],"r":1},{"k":"motorik","f":"Motorischer Homunkulus: welche Körperteile sind überproportional repräsentiert?","a":["Rumpf und Beine","Hand, Finger, Gesicht, Lippen, Zunge (Körperteile mit hoher Feinmotorik)","Schulter und Hüfte","Nur Gesicht"],"r":1},{"k":"motorik","f":"Was bedeutet 'Somatotopie' im Zusammenhang mit dem Motorkortex?","a":["Alle Muskeln an gleicher Stelle repräsentiert","Topographische Körperrepräsentation im Kortex (Homunkulus); jede Körperregion hat eigenes kortikales Areal","Nur sensorisch relevant","Nur beim Säugling"],"r":1},{"k":"motorik","f":"Welcher Trakt ist der 'einzige direkte Kortex-Rückenmark-Weg'?","a":["Tractus rubrospinalis","Tractus corticospinalis (Pyramidenbahn); einzige direkte Verbindung Kortex→RüMa ohne Umschaltung im Hirnstamm","Tractus vestibulospinalis","Tractus tectospinalis"],"r":1},{"k":"motorik","f":"Interneurone im RüMa: Verhältnis zu MN?","a":["1:1 (gleich viele)","~30:1 (30 Interneurone pro MN!); nahezu alle supraspinalen Eingänge kontaktieren α-MN indirekt über Interneurone","1:10 (weniger Interneurone)","100:1"],"r":1},{"k":"motorik","f":"Typ I (slow-twitch) Muskelfasern: welche Eigenschaften?","a":["Weiß, anaerob, schnell ermüdend, für Sprints","Rot (myoglobinreich), oxidativ, ermüdungsresistent, langsam kontrahierend; Ausdauermuskeln (Rückenstrecker, M. soleus)","Pink, gemischt, mittelschnell","Schnell, kräftig, anaerob"],"r":1},{"k":"motorik","f":"Was ist 'Sprouting' bei MN-Verlust?","a":["Wachstum neuer kortikaler MN","Benachbarte α-MN treiben neue Axonkollateralen aus und übernehmen verwaiste Muskelfasern; Fasern nehmen Typ des neuen MN an → 'fibre-type grouping' (histolog. pathologisch!)","Axon-Regeneration des geschädigten MN","Gliose im Vorderhorn"],"r":1},{"k":"motorik","f":"Myotome L3-L4: welcher Muskel und welcher Reflex?","a":["M. biceps femoris; Hamstring-Reflex","M. quadriceps femoris; Patellarsehnenreflex (PSR); Kniescheibensehnenreflex","M. tibialis anterior; Kein eigener Reflex","M. gastrocnemius; Achillessehnenreflex"],"r":1},{"k":"motorik","f":"Welcher Reflex prüft L5?","a":["Patellarsehnenreflex","Achillessehnenreflex (S1!)","Kein eindeutiger monosynaptischer Reflex für L5!","Bicepsreflex (C5-C6)"],"r":2},{"k":"motorik","f":"Was ist die 'gemeinsame Endstrecke' der Motorik?","a":["Motorkortex M1","Das α-Motoneuron im Vorderhorn: integriert alle supraspinalen + spinalen Eingänge → Endscheidung ob AP ausgelöst wird","Pyramidenbahnkreuzung","Thalamus"],"r":1},{"k":"motorik","f":"Paraphasie vs. Paraparese: was ist richtig?","a":["Beide sind Sprachstörungen","Paraphasie = falsches Wort/Wortbestandteil in der Sprache (Aphasie); Paraparese = beidseitige Beinlähmung (motorisch)","Paraparese = Sprachstörung; Paraphasie = motorisch","Beide = vollständige Lähmungen"],"r":1},{"k":"motorik","f":"Welche Faserqualität fehlt beim N. trochlearis (IV) komplett?","a":["GSE (somatomotorisch)","GVE (parasympathisch) und alle sensorischen Faserqualitäten; N.IV hat NUR GSE (rein motorisch)!","SVE (branchiomotorisch)","GSA (somatosensibel)"],"r":1},{"k":"motorik","f":"Corticobulbäre Bahn: was innerviert sie?","a":["Rumpfmuskulatur via RüMa","Motorische Hirnnervenkerne im Hirnstamm (III-VII, IX-XII); über Fibrae corticonucleares; meist kontralateral","Kleinhirn direkt","Basalganglien"],"r":1},{"k":"motorik","f":"Was ist 'motorische Apraxie'?","a":["Lähmung durch MN-Schaden","Unfähigkeit, erlernte Bewegungen auszuführen trotz intakter Motorik, Sensibilität und Koordination; Parietallappen-Läsion (Bewegungsprogramm gestört)","Kleinhirnataxie","Extrapyramidale Störung"],"r":1},{"k":"motorik","f":"Welches Zeichen unterscheidet ALS von reiner Myelopathie?","a":["Spastik","Faszikulationen + Muskelatrophie (= LMN) bei gleichzeitig vorhandener Hyperreflexie + Spastik (= UMN) → BEIDE Zeichen gleichzeitig = typisch ALS!","Sensibilitätsstörungen","Blasenstörung"],"r":1},{"k":"motorik","f":"Welche Aussage zu Faszikulationen ist richtig?","a":["Faszikulationen = immer benigne (keine Bedeutung)","Faszikulationen = spontane Entladungen ganzer motorischer Einheiten; sichtbar unter Haut; Zeichen von UMN-Läsion","Faszikulationen = spontane Entladungen motorischer Einheiten; Zeichen von LMN-Läsion (Denervierung); bei ALS!","Faszikulationen nur im Schlaf"],"r":2},{"k":"motorik","f":"Welcher Muskel ist für die Dorsalflexion des Fußes zuständig (L4-L5)?","a":["M. gastrocnemius","M. tibialis anterior (Fußheber); Läsion L4/L5 → Fußheber-Parese; N. fibularis profundus","M. soleus","M. biceps femoris"],"r":1},{"k":"motorik","f":"Was ist die Funktion des Ncl. ruber?","a":["Hauptzentrum für Haltungsmotorik","Teil des lateralen motorischen Systems; erhält Afferenzen vom Kleinhirn (Ncl. dentatus/interpositus) + Kortex; Tractus rubrospinalis → Feinmotorik distale Extremitäten","Hauptzentrum Schlucken","Autonome Motorik"],"r":1},{"k":"motorik","f":"Somatosensorischer Kortex S1 (Gyrus postcentralis): welche Brodmann-Areale?","a":["Area 4 und 6","Area 3a + 3b + 1 + 2; hinter Zentralsulcus; Läsion → kontralaterale Hemihypästhesie","Area 44 und 45","Area 17 und 18"],"r":1},{"k":"motorik","f":"Haltungsreflexe im Säugling: wann verschwindet der Moro-Reflex?","a":["Bleibt lebenslang bestehen","Verschwindet mit ~4-6 Monaten (Reifung kortikaler Hemmung); wie Babinski und Greifreflex; Persistenz = Entwicklungsstörung","Verschwindet nach 1 Jahr","Verschwindet erst mit Laufen"],"r":1},{"k":"motorik","f":"Welche Symptomkonstellation zeigt ein ACA-Infarkt?","a":["Armplegie + Aphasie","Beinlähmung kontralateral + Inkontinenz + Persönlichkeitsänderung (mediales Frontalhirn)","Visuelle Halluzinationen","Kleinhirnataxie"],"r":1},{"k":"motorik","f":"Myosin-ATPase: Bedeutung für Muskelfasertypen?","a":["Gleich in allen Fasertypen","Typ-I: langsame Myosin-Isoform (slow-twitch); Typ-II: schnelle Isoform (fast-twitch); histochemisch anfärbbar (pH-abhängig) für Muskelfasertyp-Bestimmung","Nur in Herzmuskel","Nur für isometrische Kontraktion"],"r":1},{"k":"motorik","f":"Was ist 'Hemi-Neglect' und welches Hirnareal?","a":["Halbseitenlähmung; Motorkortex","Fehlende Beachtung einer Körper-/Raumhälfte trotz intakter sensorischer Fähigkeiten; nicht-dominanter parietaler Kortex (meist rechts → Vernachlässigung der linken Seite)","Gedächtnisstörung; Hippocampus","Aphasie; Broca-Areal"],"r":1},{"k":"motorik","f":"Welcher spinale Reflex verhindert Muskelverletzung bei Überdehnung?","a":["Ia-Reflex (Dehnungsreflex)","Ib-Golgi-Reflex: Ib-Fasern aktivieren Ib-Interneurone → hemmen Agonist → verhindert Ruptur bei Überbelastung (inverse myotatic reflex)","Flexorreflex","Gekreuzter Extensorreflex"],"r":1},{"k":"motorik","f":"Welche Aussage zum Tractus vestibulospinalis lateralis ist richtig?","a":["Hemmt Extensoren","Aktiviert Extensoren IPSILATERAL (Haltungsmotorik); Ncl. Deiters → kein Überkreuzen; physiologisch durch Vestibulozerebellum gehemmt","Kreuz auf Höhe der Medulla","Aktiviert Flexoren für Lokomotiom"],"r":1},{"k":"motorik","f":"Akinesie bei Parkinson: welcher Mechanismus?","a":["Direkte Kortexschädigung","Dopaminmangel → indirekter Weg überwiegt → Thalamus stark gehemmt → reduzierte Aktivierung motorischer Kortexareale → Bewegungsinitiierung unmöglich oder stark verlangsamt","Kleinhirndysfunktion","Sensorisches Defizit"],"r":1},{"k":"motorik","f":"Was versteht man unter 'Disinhibition' als motorisches Prinzip?","a":["Direkte Erregung von MN","Hemmung eines hemmenden Neurons → Enthemmung des MN; typisch in Basalganglien (GPi hemmt Thalamus; bei direktem Weg: Striatum hemmt GPi → Thalamus disinhibiert)","Kollateralenbildung","Synaptische Fatigue"],"r":1},{"k":"zerebellum","f":"Was ist frakturierte Somatotopie im Kleinhirn?","a":["Keine Somatotopie vorhanden","Multiple Repräsentationen des Körpers im Kleinhirn (nicht nur ein Homunkulus); jede Region mehrfach verteilt repräsentiert","Nur ein einziger Homunkulus im Vermis","Somatotopie nur in Kleinhirnkernen"],"r":1},{"k":"zerebellum","f":"Vestibulozerebellum und VOR: wie hängen sie zusammen?","a":["Vestibulozerebellum kontrolliert NICHT den VOR","Flocculus/Nodulus erhält vestibuläre Afferenzen → Purkinje-Zellen → Vestibularkerne → Ncl. VI/III → Augenmuskeln; kalibriert + adaptiert VOR (Plastizität!)","VOR läuft nur über Hirnstamm ohne Kleinhirn","Vestibulozerebellum = Gleichgewicht allein"],"r":1},{"k":"zerebellum","f":"Warum führt Kleinhirnläsion zu IPSILATERALER Ataxie?","a":["Kleinhirn verarbeitet kontralaterale Körperhälfte","Kleinhirn kreuzt effektiv zweimal: Pontine Kerne → Ped. cer. medius (kreuzt) → Kleinhirn → Dentatus → Thalamus (kreuzt) → Kortex → Pyramidenbahn (kreuzt) → RüMa; 2 Kreuzungen = ipsilateral!","Gar keine Kreuzung; direkt ipsilateral","Einfache Kreuzung wie Pyramidenbahn"],"r":1},{"k":"zerebellum","f":"Welche Erkrankung schädigt selektiv Purkinje-Zellen?","a":["Parkinson","Chronischer Alkoholmissbrauch (nutritiver/toxischer Einfluss → PZ-Degeneration v.a. im Vermis → Gangataxie!); auch paraneoplastisch (Anti-Yo-AK)","Alzheimer","MS (selektiv Purkinje)"],"r":1},{"k":"zerebellum","f":"Timing-Hypothese des Kleinhirns: was besagt sie?","a":["Kleinhirn lernt nur Bewegungen","Kleinhirn erfasst zeitliche Aspekte von Bewegungen; Parallelfaser-Anordnung (lang, horizontal) suggeriert 'zeitliche Achse'; sequential firing ermöglicht timing-Kontrolle","Kleinhirn ist Komparator allein","Kleinhirn reguliert nur Gleichgewicht"],"r":1},{"k":"zerebellum","f":"Ncl. interpositus: Verbindungen und Funktion?","a":["Vestibuläre Funktion (wie Ncl. fastigii)","Besteht aus Ncl. emboliformis + Ncl. globosus; intermediäre Hemisphäre → Ncl. interpositus → Ncl. ruber (ipsilateral) + Thalamus VL; Kontrolle Extremitätenkoordination","Ausgang für Augenmotorik","Planung von Willkürbewegungen"],"r":1},{"k":"zerebellum","f":"Kleinhirn-Glomerulus: Zusammensetzung?","a":["Kletterfaser-Bouton + Purkinje-Dendriten","Moosfaser-Bouton (Zentrum) + Körnerzell-Dendriten + Golgi-Axone/-Dendriten; synaptischer Komplex im Stratum granulosum; Integration mehrerer Eingänge","Parallelfaser + Korbzelle","Purkinje + Korbzelle"],"r":1},{"k":"zerebellum","f":"Was ist der Unterschied zwischen Moos- und Kletterfaser-Eingang auf Purkinje-Zellen?","a":["Beide direkt; kein Unterschied","Moosfasern: INDIREKT via Körnerzellen→Parallelfasern (massenweise, 200.000!); Kletterfasern: DIREKT auf PZ (1:1, massive Erregung, complex spikes); verschiedene Lernfunktionen","Beide indirekt über Interneurone","Kletterfasern indirekt; Moosfasern direkt"],"r":1},{"k":"zerebellum","f":"Adaptation des Lidschlussreflexes: warum ist Kleinhirn notwendig?","a":["Kleinhirn speichert Gedächtnis","CS (Ton) → Moosfasern → Ncl. interpositus; US (Luftstoss) → Kletterfasern; Ko-Aktivierung → LTD an PZ → weniger PZ-Hemmung → mehr Ncl. interpositus-Aktivierung → Lidschluss auf CS allein","Hippocampus ausreichend","Amygdala allein"],"r":1},{"k":"zerebellum","f":"Welcher Neurotransmitter hemmt Kleinhirnkerne direkt?","a":["Glutamat (erregend)","GABA (aus Purkinje-Zellen → hemmt Kleinhirnkerne; einziger Ausgang des Kortex ist inhibitorisch!)","Dopamin","Acetylcholin"],"r":1},{"k":"zerebellum","f":"Cerebelläre Kognition: welche Funktion über Motorik hinaus?","a":["Keine kognitiven Funktionen","Dysmetria of thought (Leiner); Zerebrozerebellum verbunden mit präfrontalem Kortex → Timing/Koordination kognitiver Prozesse; CCAS (cerebellar cognitive affective syndrome) bei Läsion","Sprache allein","Nur Gedächtnis"],"r":1},{"k":"zerebellum","f":"Pendulares Knie beim klinischen Hammer-Test: warum?","a":["Hyperreflexie wie bei Pyramidenbahnläsion","Muskelhypotonie bei Kleinhirnläsion → Dehnungsreflex schwingt aus → Bein pendelt mehrfach; normalerweise stoppt Bein nach einer Schwingung","Kein Reflex auslösbar","Spastischer Widerstand"],"r":1},{"k":"zerebellum","f":"Welcher Kleinhirnteil ist bei Alkohol-Ataxie am meisten betroffen?","a":["Laterale Hemisphäre","Vermis (besonders Lobus anterior); → gangspezifische Ataxie ('Trinkergang'); Purkinje-Zellen im Vermis besonders vulnerabel für Alkohol + Thiaminmangel (Wernicke!)","Flocculonodularis","Ncl. dentatus isoliert"],"r":1},{"k":"zerebellum","f":"Hereditäre Ataxien: Friedreich-Ataxie – Erbgang + Pathologie?","a":["Autosomal-dominant; Kleinhirn allein","Autosomal-rezessiv; Frataxin-Mutation (Chromosom 9q, GAA-Repeat); Degeneration: Kleinhirn + Hinterstränge + periphere Nerven + Herzmuskel → Ataxie + Areflexie + Kardiomyopathie!","X-chromosomal; nur Kleinhirn","Autosomal-dominant; Olivopontocerebelläre Atrophie"],"r":1},{"k":"zerebellum","f":"Was ist 'Rebound-Phänomen' bei Kleinhirnläsion?","a":["Überschießender Reflex","Nach Unterbrechung eines Widerstands: Arm überschießt weit → fehlende Bremsung durch Antagonisten; Kleinhirn koordiniert normalerweise Agonist/Antagonist-Timing","Verstärkter Dehnungsreflex","Klonisches Zittern"],"r":1},{"k":"zerebellum","f":"Olivopontocerebelläre Atrophie (OPCA): was degeneriert?","a":["Nur Purkinje-Zellen","Oliven + pontine Kerne + Kleinhirn; Teil der Multisystematrophie (MSA-C); Ataxie + autonome Dysfunktion + manchmal Parkinson","Nur Hirnstamm","Nur Großhirn"],"r":1},{"k":"zerebellum","f":"Welche cerebelläre Schicht enthält die meisten Neurone?","a":["Stratum moleculare","Stratum ganglionare","Stratum granulosum (Körnerzellen! → mehr Neurone als irgendwo sonst im ZNS; Dichte ~6 Mio/mm³)","Kleinhirnmark"],"r":2},{"k":"zerebellum","f":"Fehler-Signal via Kletterfaser: Woher kommt das Error-Signal in die untere Olive?","a":["Direkt vom Motorkortex","Aus verschiedenen Quellen: Rückenmark + Ncl. ruber + Kleinhirnkerne + kortikale Kollarateralen; Olive = Integrationsort für Fehlersignale → dann als Kletterfaser-Complex-spikes","Direkt vom Thalamus","Nur aus Vestibularkernen"],"r":1},{"k":"zerebellum","f":"Neurogenese im Kleinhirn postnatal: was ist besonders?","a":["Keine postnatale Neurogenese","Körnerzellen entstehen hauptsächlich POSTNATAL (bis 18 Monate!); externe Körnerzellschicht → migrieren nach innen (Bergmann-Glia als Leitstruktur); deshalb Kleinhirn besonders vulnerabel für postnatale Schäden","Purkinjezellen entstehen postnatal","Alles pränatal"],"r":1},{"k":"zerebellum","f":"Was ist der Unterschied zwischen cerebellären und frontalen Exekutivstörungen?","a":["Kein Unterschied","Cerebellär: Timing-Fehler, motorische Fehler; frontal: Planungsfehler, Enthemmung, Perseveration; beide können kognitive Funktionen beeinträchtigen aber auf verschiedene Art","Beide nur motorisch","Frontal hat keine Störungen"],"r":1},{"k":"zerebellum","f":"Kleinhirn-Thalamus-Kortex Schleife: welcher Thalamuskern?","a":["Thalamus VPL (sensorisch)","Thalamus VL (Ventrolateral) + VA (Ventralanterior) → M1/PM/SMA; Ncl. dentatus → VL-Thalamus (Hauptverbindung); Basalganglien gehen eher zu VA","Thalamus CGL (visuell)","Thalamus MD (limbisch)"],"r":1},{"k":"basalganglien","f":"Was sind 'Striasomen' und 'Matrix' im Striatum?","a":["Zwei verschiedene Kerne","Zwei chemisch unterscheidbare Kompartimente im Striatum: Striasomen (Enkephalin+, stark opiaterg, limbisch) + Matrix (Calbindin+, sensorimotor); getrennte Inputs/Outputs","Striatum-Schichten wie Kortex","Terminologie veraltet"],"r":1},{"k":"basalganglien","f":"Was ist der Unterschied zwischen D1- und D2-Rezeptoren biochemisch?","a":["Kein Unterschied, beide Gi","D1 (+ D5): Gs-GPCR → Adenylatzyklase↑ → cAMP↑ → PKA↑; D2 (+ D3, D4): Gi-GPCR → Adenylatzyklase↓ → cAMP↓; unterschiedliche Wirkung auf MSN!","Beide Gq-GPCR → IP3","D1 ionotrop; D2 metabotrop"],"r":1},{"k":"basalganglien","f":"Mesostriatales vs. mesolimbisches Dopaminsystem: Unterschied?","a":["Identisch; nur Terminologie","Mesostriatales System: SNc → Putamen/Caudatus (motorische Kontrolle); Mesolimbisches System: VTA → Ncl. accumbens (Belohnung/Motivation/Sucht)","Beide aus LC (Noradrenalin)","Beide identisch; aus SNc"],"r":1},{"k":"basalganglien","f":"Cholinergische Interneurone im Striatum: Funktion?","a":["Keine Funktion (selten)","Tonisch aktive Neurone (TANs); pausieren bei Belohnungs-Signalen; modulieren DA-Freisetzung + MSN-Aktivität; bei Parkinson: relatives Übergewicht → Behandlung mit Anticholinergika (Biperiden)","Einzige Afferenzen des Striatums","Projektion zu GPi"],"r":1},{"k":"basalganglien","f":"Ballismus: was ist das und welche Struktur betroffen?","a":["Kleinhirnataxie","Große, werfende Bewegungen (meist halbseitig = Hemiballismus); LÄSION DES STN → direkter Weg dominant → GPi gehemmt → Thalamus disinhibiert → überschießende Bewegungen","Parkinson-Stadium","Huntington-Spätphase"],"r":1},{"k":"basalganglien","f":"MPTP-Parkinson: Mechanismus?","a":["Genetische Mutation","MPP+ (Metabolit von MPTP durch MAO-B) akkumuliert in dopaminergen Neuronen → Komplex-I-Hemmung der mitochondrialen Atmungskette → oxidativer Stress → selektiver SNc-Tod; erklärt mitochondriale Ätiologiehypothese","Immunangriff auf SNc","Mechanische Schädigung"],"r":1},{"k":"basalganglien","f":"Welche Transmitter produziert die Substantia nigra pars reticulata (SNr)?","a":["Dopamin (wie SNc)","GABA (GABAerge Projektionsneurone → Thalamus + Colliculus superior + PPT); SNr ist Ausgangs-Struktur der Basalganglien wie GPi","Glutamat","Serotonin"],"r":1},{"k":"basalganglien","f":"Habituelles Lernen (Gewohnheitslernen): welche Struktur?","a":["Hippocampus","Dorsolaterales Striatum (Putamen) + Basalganglien; stimulus-response Assoziation; automatische Gewohnheiten; konkuriert mit Hippocampus-abhängigem deklarativem Lernen","Amygdala","Kleinhirn allein"],"r":1},{"k":"basalganglien","f":"Was ist 'Lewy-Body-Disease'?","a":["Reine Parkinson-Erkrankung","Überbegriff für α-Synucleinopathien mit Lewy Bodies: Parkinson (SNc), Lewy-Körper-Demenz (kortikal), Parkinson-Demenz (DLB+PDD = Spektrum!)","Huntington-Variante","Alzheimer-Variante"],"r":1},{"k":"basalganglien","f":"Parkinson: Was passiert beim Rigor (Zahnradphänomen)?","a":["Spastik durch Pyramidenbahnläsion","Gleichmäßig erhöhter Muskeltonus durch Überaktivität des alpha-MN-Pools (veränderte supraspinale Einflüsse); intermittierend klickendes Nachgeben = Zahnradphänomen; v.a. distale Extremitäten","Kleinhirn-Hypotonie","Athetose"],"r":1},{"k":"basalganglien","f":"Welche Symptomtrias kennzeichnet Parkinson?","a":["Chorea + Athetose + Ballismus","Rigor (Zahnradphänomen) + Tremor (Ruhetremor 4-6 Hz) + Akinese/Bradykinese; + Haltungsinstabilität als 4. Symptom","Ataxie + Nystagmus + Dysmetrie","Spastik + Hyperreflexie + Babinski"],"r":1},{"k":"basalganglien","f":"Striatum erhält Afferenzen aus dem gesamten Kortex: was ist der dominant gewichtet?","a":["Okzipitalkortex","Motorische Areale (PM, SMA, M1) dominant; aber ALLE Kortexareale projizieren ins Striatum (Konvergenz!); starke Divergenz eines Areals auch über verschiedene Striatumareale","Auditorischer Kortex","Hippocampus direkt"],"r":1},{"k":"basalganglien","f":"Was erklärt die therapeutische Wirkung von Apomorphin bei Parkinson?","a":["Anticholinergum","Dopamin-Agonist (D1+D2); wirkt direkt auf Striatum-MSN (kein Bedarf für enzymatische Umwandlung wie L-Dopa); schnell wirkend → Rescue-Medikament bei Off-Phasen; subkutan oder intranasal","Monoaminoxidase-Hemmer","Glutamat-Antagonist"],"r":1},{"k":"basalganglien","f":"Was ist tardive Dyskinesie?","a":["Akute Parkinson-Krise","Spätdyskinesie durch langfristige Neuroleptika-Einnahme (D2-Blockade); Überempfindlichkeit der D2-Rezeptoren nach Langzeit-Blockade → choreiforme Bewegungen besonders im Gesicht/Mund","Huntington-Frühstadium","Tourette-Syndrom"],"r":1},{"k":"basalganglien","f":"Tourette-Syndrom: Pathophysiologie?","a":["Reine Kleinhirnstörung","Dysfunktion kortikal-striataler Schleifen (hyperdopaminerg?); multiple motorische + vokale Tics; meist Kindesalter; Komorbidität ADHD + OCD; Behandlung: Haloperidol, Clonidin","Serotonin-Mangel","Neuronales Trauma"],"r":1},{"k":"basalganglien","f":"Was ist die Funktion des N. pedunculopontinus (PPN) in Basalganglien-Schaltkreisen?","a":["Nicht verbunden mit Basalganglien","PPN (mesencephale Motorregion) erhält Afferenzen von GPi/SNr + STN; projiziert zum Thalamus + RüMa; wichtig für Lokomotion + Schlaf-Wach-Regulation; neue Tiefenhirnstimulations-Zielstruktur bei Freezing of gait!","Nur Kleinhirnkern","Rein sensorisch"],"r":1},{"k":"basalganglien","f":"Welche Symptome zeigt Huntington-Chorea im Verlauf außer motorischen?","a":["Nur motorische Symptome","Kognitive Symptome (frontale Demenz); psychiatrische Symptome (Depression, Psychose, Reizbarkeit) oft VOR Motorik; später Schluckstörungen; gesamte Lebenserwartung 15-20 Jahre nach Diagnose","Sensorische Ausfälle","Nur Endzustand: Querschnitt"],"r":1},{"k":"basalganglien","f":"COMT-Hemmer bei Parkinson: Funktion?","a":["Hemmen MAO-B","Hemmen Catechol-O-Methyltransferase → verhindern Abbau von L-Dopa zu 3-O-Methyldopa in der Peripherie → mehr L-Dopa erreicht Gehirn; Entacapon, Tolcapon; verlängern L-Dopa-Wirkung","Dopaminagonisten","NMDA-Antagonisten"],"r":1},{"k":"basalganglien","f":"Warum verursacht Kokain Euphorie über Basalganglien?","a":["Blockiert NMDA-Rezeptoren","Kokain hemmt den Dopamin-Transporter (DAT) → Dopamin akkumuliert im synaptischen Spalt → DA-Rezeptoren (D1+D2) im Ncl. accumbens massiv aktiviert → Euphorie; chronisch: Desensibilisierung → Anhedonie ohne Droge","Serotonin-Freisetzung","GABA-Blockade"],"r":1},{"k":"basalganglien","f":"Was ist 'Freezing of Gait' bei Parkinson?","a":["Willkürliches Innehalten","Plötzliches unwillkürliches Einfrieren des Ganges (besonders bei Hindernissen, engen Räumen, Zielannäherung); dysfunktionale Basalganglien können Gangprogramm nicht starten; rhythmische auditorische Stimulation hilft!","Kleinhirnataxie","Spastik"],"r":1},{"k":"thalamus","f":"Welcher Thalamuskern ist am größten?","a":["Ncl. VPL","Pulvinar (posteriorer Thalamus); visuell-auditorische Assoziation; multimodale Integration; verbunden mit parietalen + temporalen Assoziationskortizes","Ncl. centromedianus","Ncl. mediodorsalis"],"r":1},{"k":"thalamus","f":"Was sind Thalamic oscillations und warum für Schlaf wichtig?","a":["Nur pathologisch bei Epilepsie","Rhythmische Entladungen durch Wechselspiel Ncl. reticularis thalami (hemmt) ↔ Relaiskerne (Burst-Modus) → Schlafspindeln (12-14 Hz) + K-Komplexe; physiologisch für Schlafkonsolidierung","Nur im Wachzustand","REM-Schlaf-spezifisch"],"r":1},{"k":"thalamus","f":"Was ist der VPLc vs. VPLo im Thalamus?","a":["Identisch; keine Unterteilung","VPLc = Somatosensorik Rumpf/Extremitäten (Afferenzen: Hinterstrangkerne + Spinothalamikus → S1); VPLo = Kleinhirn (dentato-thalamische Bahn) → motorische Kortexareale; wichtige Distinktion!","Beide für Basalganglien-Input","VPLc = visuell; VPLo = auditiv"],"r":1},{"k":"thalamus","f":"Habenula: Funktion?","a":["Relais für Sehbahn","Epithalamusstruktur; antireward-System; Hemmung der VTA-Dopaminneurone bei negativem Outcome (reward prediction error negativ); verbunden mit limbischem System; Rolle bei Depression","Blutdruck-Regulation","Liquorproduktion"],"r":1},{"k":"thalamus","f":"Zirbeldrüse (Glandula pinealis): was produziert sie und wann?","a":["Serotonin tagsüber","Melatonin NACHTS (aus Serotonin via NAT); Licht über Retina → SCN → NE → hemmt Melatonin-Synthese; einzige SINGULÄRE (nicht paarige) Hirnstruktur!; Grundlage für zirkadiane Rhythmik","Cortisol","ACTH"],"r":1},{"k":"thalamus","f":"REM-Schlaf: Wie werden Träume erklärt (Aktivierungs-Synthese-Hypothese)?","a":["Träume haben keine neurologische Basis","Pontine Activation (PGO-Wellen aus PPRF) → random kortikale Aktivierung; Kortex synthetisiert narrative Geschichte aus zufälligen Aktivierungsmustern; Amygdala-Aktivierung → emotionale Träume","Träume entstehen nur im Hippocampus","Träume = REM-unabhängig"],"r":1},{"k":"thalamus","f":"Obstruktives Schlafapnoesyndrom (OSAS): neurologische Folgen?","a":["Keine neurologischen Auswirkungen","Chronische Sauerstoffsättigung↓ + Schlaffragmentierung → kognitive Beeinträchtigungen, Gedächtnisstörungen, erhöhtes AD-Risiko (verminderter Glymphfluss!), Bluthochdruck, Schlaganfallrisiko↑","Nur kardial relevant","Nur Lungenerkrankung"],"r":1},{"k":"thalamus","f":"N2-Schlaf: was sind Schlafspindeln und wozu dienen sie?","a":["Pathologische Epilepsie-Aktivität","12-14 Hz Wellen durch thalamokortikale Oszillationen; Ncl. reticularis thalami; Funktion: möglicherweise motorisches Lernen konsolidieren + Schutz des Schlafs vor externen Stimuli (Tor zum Bewusstsein schließen)","Nur bei Kindern","REM-Schlaf-spezifisch"],"r":1},{"k":"thalamus","f":"Welche Neurotransmitter aktivieren das ARAS und fördern damit Wachheit?","a":["GABA (hemmend)","Noradrenalin (LC), Serotonin (Raphekerne), ACh (PPT/LDT, Ncl. basalis), Histamin (TMN = Tuberculo-mamilläre Ncl.), Orexin/Hypocretin (lateraler Hypothalamus) → alle erregen Thalamus + Kortex","Adenosin (hemmend)","Glycin (hemmend)"],"r":1},{"k":"thalamus","f":"Welcher Kern des Thalamus ist Hauptrelais für den Sehweg?","a":["Ncl. VPM","Corpus geniculatum laterale (CGL = Metathalamus); 6 monokuläre Schichten; Retinotopisch","Ncl. centromedianus","Pulvinar"],"r":1},{"k":"thalamus","f":"Thalamus-Syndrom (Déjerine-Roussy): Symptome?","a":["Thalamische Demenz","Spontaner Dauerschmerz + Hyperalgesie + Allodynie kontralateral nach Thalamus-VPL-Läsion; paradox: zunächst Gefühllosigkeit, dann überschießende Schmerzempfindlichkeit; schwer therapierbar","Rein motorische Ausfälle","Gedächtnisverlust"],"r":1},{"k":"thalamus","f":"Was ist PGO-Welle (Ponto-geniculo-okzipitale Welle)?","a":["Epileptiforme Entladung","Elektrische Wellen im REM-Schlaf: Pons (PPRF) → CGL → okzipitaler Kortex; Basis für schnelle Augenbewegungen im REM; auch verantwortlich für visuelle Traumbilder","Wach-Reaktion","Alpha-Wellen-Variante"],"r":1},{"k":"thalamus","f":"Was ist polyphasischer Schlaf und bei welchen Lebewesen?","a":["Nur beim Menschen","Mehrere Schlaf-Wach-Zyklen über 24h (z.B. Nickerchen tagsüber); Säuglinge + ältere Menschen natürlich; viele Tiere (Hunde, Katzen); kulturell abhängig beim Menschen (Siesta); evolutionär möglicherweise die Ur-Form","Nur pathologisch","Nur bei Narkolepsie"],"r":1},{"k":"thalamus","f":"Adenosin: warum blockiert Koffein den Schlaf?","a":["Koffein ist Dopamin-Agonist","Adenosin akkumuliert bei Wachheit (homöostatischer Schlafdruck); bindet A1/A2A-Rezeptoren → Schlaf-fördernde Areale (VLPO) aktiviert + ARAS gehemmt; Koffein = kompetitiver Adenosin-Antagonist → hält ARAS aktiv!","Koffein erhöht Melatonin","Koffein = GABA-Blocker"],"r":1},{"k":"thalamus","f":"CGL-Schichten: welche Schichten empfangen kontralaterale Input?","a":["Schicht 1+2 (kontralateral)","Schicht 1, 4, 6 (kontralateral, nasale Retina) + Schicht 2, 3, 5 (ipsilateral, temporale Retina); alternierend; 6 Schichten streng monookulär vor V1-Verrechnung!","Nur Schicht 1 kontralateral","Alle Schichten bilateral"],"r":1},{"k":"thalamus","f":"Was ist Somnambulismus (Schlafwandeln) und n ACA, MCA, PCA an Grenzzonen; bei Hypotension: 'Grenzzoneninfarkte' (watershed infarcts); z.B. zwischen ACA/MCA-Versorgungsgebiet = proximale Armlähmung dominant","Direkte Verbindung ACA-PCA","Kollateralweg über Kleinhirn"],"r":1},{"k":"hirnhaeute","f":"Welche Struktur ist der sensorische Rezeptor der Meningitis-Schmerzen?","a":["Kortex direkt","Freie Nervenendigungen in der Dura mater (Pia + Arachnoidea = schmerzfrei!); N.V innerviert Tentorium + Dura ant. Schädelgrube; N.X + N.IX innervieren Dura hintere Schädelgrube","Ventrikelwände","Plexus choroideus"],"r":1},{"k":"hirnhaeute","f":"Was ist 'Hirntod' klinisch und neurologisch?","a":["Persistierendes vegetatives Stadium","Irreversibler Ausfall aller Hirnfunktionen inkl. Hirnstamm; Diagnostik: Koma + Hirnstammreflexe alle ausgefallen (VOR, Kornea-Reflex, Pupillenreflex, Hustenreflex) + Apnoe-Test; EEG-Stille; VOR-Fehlen bei Eiswasser-Test!","Nur Kortex ausgefallen","Reversibles Koma"],"r":1},{"k":"hirnhaeute","f":"Was ist ein PRES (Posterior Reversible Encephalopathy Syndrome)?","a":["Klassischer Schlaganfall","Vasogenes Ödem v.a. posterior bei hypertensiver Krise/Eklampsie; Autoregulationsversagen → Hyperperfusion → BHS-Schaden → Ödem; Symptome: Sehstörungen + Krampfanfall + Verwirrtheit; MRI-reversibel bei Behandlung","Immer irreversibel","Nur bei Kindern"],"r":1},{"k":"hirnhaeute","f":"A. communicans posterior-Aneurysma: typisches Zeichen?","a":["MCA-Aphasie","N.III-Parese! (Aneurysma komprimiert N.III beim Austritt aus Fossa interpeduncularis) → Ptosis + Mydriasis + Augen-'unten-außen'; WARNSIGNAL für Ruptur!","Taubheit einseitig","Horner-Syndrom"],"r":1},{"k":"hirnhaeute","f":"Hirnödem: vasogenes vs. zytotoxisches Ödem?","a":["Identisch; kein Unterschied","Vasogen: BHS-Störung → Proteine + Wasser ins Parenchym (Tumor, Abszess, Trauma); Kortikosteroide helfen! Zytotoxisch: Zellschwellung bei Ischämie (Na+-Einstrom) → Kortikosteroide NICHT wirksam; Osmotherapie","Zytotoxisch: BHS gestört; vasogen: Zelle schwillt","Beide ansprechen auf Kortison"],"r":1},{"k":"hirnhaeute","f":"Was ist Pseudotumor cerebri (idiopathische intrakranielle Hypertension)?","a":["Echter Hirntumor","Erhöhter ICP ohne Tumor oder Liquorabflussstörung; junge übergewichtige Frauen; Stauungspapille + Kopfschmerzen + Sehstörungen; Tetracycline/Vitamin A als Risikofaktoren; Therapie: Acetazolamid + LP","Normaler Liquordruck trotz Symptomen","Immer tödlich"],"r":1},{"k":"hirnhaeute","f":"Moyamoya-Erkrankung: Pathologie?","a":["Vaskulitis der großen Venen","Bilaterale progressive Stenose/Verschluss der intrakraniellen ICA + proximale ACA/MCA → extensive Kollateralentwicklung (wie 'Puff of smoke' im Angiogramm!); Kinder: Infarkte; Erwachsene: Blutungen; Behandlung: EC-IC-Bypass","Aneurysma","Kavernöses Hämangiom"],"r":1},{"k":"hirnhaeute","f":"Welche Vene ist für 70% der Liquor-Resorption verantwortlich?","a":["Vena jugularis interna","Sinus sagittalis superior via Pacchioni-Granulationen (Granulationes arachnoideae); Liquor tritt in Sinus → venöses Blut; bei Thrombose → Hydrozephalus","Sinus cavernosus","Vena cerebri magna (Galen)"],"r":1},{"k":"hirnhaeute","f":"Was ist das Cushing-Phänomen (Cushing-Reflex)?","a":["Primärer Hyperaldosteronismus","Triade bei erhöhtem ICP: Hypertension + Bradykardie + irreguläre Atmung; Hirnstamm-Ischämie → Vasomotorenzentrum kompensiert mit massivem Blutdruckanstieg → Baroreflexbradykardie; terminales Zeichen!","Hypophysenadenom","Subarachnoidalblutung-Symptom"],"r":1},{"k":"hirnhaeute","f":"Lacunäre Infarkte: Lokalisation und Ursache?","a":["Kortex; kardialer Embolus","Tiefe Strukturen (Basalganglien, Thalamus, innere Kapsel, Hirnstamm); durch Mikroangiopathie (Lipohyalinose kleiner Perforatoren bei Hypertonie + Diabetes); typisch: pure motor hemiplegia, pure sensory stroke, ataxic hemiparesis","Kleinhirn; Arteriosklerose","Hippocampus; Karotis-Embolus"],"r":1},{"k":"hirnhaeute","f":"NIHSS (National Institutes of Health Stroke Scale): wofür und was misst es?","a":["Kognitio )","Nur Schicht I","Schicht VIII-X"],"r":1},{"k":"rueckenmark","f":"Substantia gelatinosa (Schicht II des Hinterhorns): Funktion?","a":["Motorische Schaltung","Gate-Control-Schaltung! Enthält Enkephalin-Interneurone; hemmt Nozizeptions-Transmission; Opiat-Rezeptoren hochkonzentriert hier; durch Aβ-Fasern aktivierbar → Analgesie","Propriozeptive Verarbeitung","Autonome Schaltung"],"r":1},{"k":"rueckenmark","f":"Horner-Syndrom: das 'Ciliospinalzentrum' liegt wo?","a":["C1-C4","C8-Th1 (= 1. Neuron des zentralen Sympathikus im Seitenhorn); über Stellatum → auf 2. Neuron; dann 3. Neuron entlang A. carotis","L1-L5","S2-S4"],"r":1},{"k":"rueckenmark","f":"Was ist das zervikale myelopathische Syndrom?","a":["Periphere Nervenschädigung im Arm","Kompression des zervikalen RüMa (Spondylose/Bandscheibe/Tumor) → UMN-Zeichen an Beinen + LMN-Zeichen an Armen (Kompressionshöhe) + Sensibilitätsstörungen + Blasenstörung; kein Schmerz im Rücken immer!","Nur Rückenschmerzen","Nur Taubheit"],"r":1},{"k":"rueckenmark","f":"Bandscheibenvorfall L5/S1: welche Wurzel + was fehlt klinisch?","a":["L4-Wurzel; Quadrizeps","S1-Wurzel; Achillessehnenreflex↓ + Plantarflexion↓ (M. gastrocnemius) + Sensibilität laterale Fußsohle","L5-Wurzel; Fußheber","L3-Wurzel; Kniestrecker"],"r":1},{"k":"rueckenmark","f":"Amyotrophe Lateralsklerose: warum im Namen 'lateral'?","a":["Betrifft laterales Hinterhorn","Degeneration der Seitenstränge (Tractus corticospinalis lateralis = laterale Sklerose) + Vorderhörner (amyotrophie); Seitenstrang histologisch vernarbt ('sklerotisch')","Betrifft nur eine Seite","Betrifft laterale Kortex"],"r":1},{"k":"rueckenmark","f":"Querschnittsyndrom vollständig: Symptome unterhalb der Läsion?","a":["Nur Motorik ausgefallen","Komplette Lähmung (Spastik im Verlauf) + kompletter Sensibilitätsausfall + autonome Dysfunktion (neurogene Blase, Darm, Erektion, orthostatische Dysregulation); zunächst 'spinal shock' (schlaff, areflexiv) → dann Spastik","Nur Sensibilität ausgefallen","Nur autonome Dysfunktion"],"r":1},{"k":"rueckenmark","f":"N. femoralis: Segmente + motorisch/sensibel?","a":["L1-L2; nur sensibel","L2-L4; motorisch: M. quadriceps (Kniestrecker) + Hüftbeuger; sensibel: Oberschenkel anterior + Unterschenkel medial (N. saphenus); Plexus lumbalis; Läsion: PSR↓","L4-S1; motorisch Fuß","L5-S2; motorisch Zehe"],"r":1},{"k":"rueckenmark","f":"Spina bifida: was ist das und welche Folgen?","a":["Nur kosmetischer Defekt","Neuralrohrschluss-Defekt; Spina bifida occulta (nur Knochen, symptomlos) vs. Meningozele (nur Meningen hernieren) vs. Myelomeningozele (RüMa + Meningen hernieren → schwerste Folgen: Paraparese, Blasenstörung, Hydrozephalus, Arnold-Chiari)","Rückenmarkstumor","Bandscheibenvorfall congenital"],"r":1},{"k":"rueckenmark","f":"Subakute kombinierte Rückenmarkdegeneration: Ursache + betroffene Bahnen?","a":["Alkohol; nur Hinterstrang","Vitamin B12-Mangel (Cobalamin); betrifft: Hinterstränge (Tiefensensibilität → Ataxie) + Pyramidenbahn (Spastik) + periphere Nerven (Areflexie); paradox: Hyperreflexie + Hyporeflexie gleichzeitig möglich!","Kupfer-Mangel; Seitenstrang allein","Thiaminmangel; Vorderhornzellen"],"r":1},{"k":"rueckenmark","f":"Cauda equina-Syndrom: Symptome + Notfall?","a":["Langsam progredient, kein Notfall","NOTFALL! Druck auf Cauda equina (L2-S5 Wurzeln) → 'reiterhosenförmige' Sensibilitätsstörung perineal + Blasen-/Darminkontinenz (schlaffe Blase!) + Beinlähmung schlaff + Areflexie; sofortige OP nötig!","Nur Schmerzen","Oberes MN-Syndrom"],"r":1},{"k":"rueckenmark","f":"Tractus spinothalamicus: wo liegt er im RüMa und warum klinisch wichtig?","a":["Hinterstrang; lateral","Vorderseitenstrang; KONTRALATERAL (kreuzt schnell nach Eintritt); bei selektiver Seitenstrangläsion → kontralateral Schmerz/Temp. ausgefallen, ipsilateral Motorik + Tiefensensibilität → Brown-Séquard oder Syringomyelie","Seitenstrang ipsilateral","Vorderstrang bilateral"],"r":1},{"k":"rueckenmark","f":"N. ischiadicus: Teilung und Segmente?","a":["Teilt sich im Becken in N. fem. + N. obt.","Teilt sich in Kniekehle in N. tibialis (L4-S3) + N. fibularis communis (L4-S2); größter peripherer Nerv; Läsion proximal → kompletter Unterschenkel/Fuß-Ausfall + Hamstrings geschwächt","Segmente C5-Th1","Rein sensorisch"],"r":1},{"k":"rueckenmark","f":"Propriospinale Bahnen: Funktion?","a":["Verbinden RüMa mit Kleinhirn","Interneurone die RüMa-Segmente untereinander verbinden (nicht bis Gehirn); intrasegmentale und intersegmentale Koordination; wichtig für CPG-Schaltkreise; bei hoher Rückenmarksverletzung: propriospinale Myoklonien","Verbinden Hinter- + Vorderhörner","Verbinden RüMa mit Sympathikus"],"r":1},{"k":"somatosensorik","f":"Was ist der Unterschied zwischen Epikritik und Protopathie?","a":["Identisch; nur Terminologie","Epikritik: feine Qualitäten (Diskriminierung, Vibration, Propriozeption) via Hinterstrang (Aβ-Fasern); Protopathie: grobe Qualitäten (Schmerz, Temperatur) via Tractus spinothalamicus (Aδ, C-Fasern); dissoziierte Empfindungsstörung bei getrennter Läsion","Epikritik = schnell; Protopathie = langsam","Beide via Hinterstrang"],"r":1},{"k":"somatosensorik","f":"Propriozeption: welche Fasern + welcher Weg?","a":["C-Fasern; Tractus spinothalamicus","Ia + Ib + II-Fasern (Aα/Aβ); bewusste Propriozeption → Hinterstrang → Ncl. gracilis/cuneatus → VPL → S1; unbewusste → Tractus spinocerebellaris → Kleinhirn","Aδ-Fasern; Tractus cortikospinalis","Keine speziellen Fasern; überall"],"r":1},{"k":"somatosensorik","f":"Phantom-Schmerz: Mechanismus?","a":["Periphere Nervenentzündung im Stumpf","Zentrale Reorganisation (Kortex): fehlendes sensorisches Feedback → Kortexareale des amputierten Teils werden von benachbarten Regionen 'übernommen'; reaktive kortikale Plastizität → ektopische Wahrnehmung + Schmerz; Mirror-Therapie kann helfen","Psychogener Schmerz allein","Reflexsympathische Dystrophie"],"r":1},{"k":"somatosensorik","f":"CRPS (komplexes regionales Schmerzsyndrom, Typ I=RSD): Kennzeichen?","a":["Rein muskulärer Schmerz","Brennender Dauerschmerz + autonome Dysfunktion (Ödem, Temperatur-Asymmetrie, Schwitzen) + motorische Störungen + Allodynie/Hyperalgesie nach meist trivialem Trauma; periphere Sensibilisierung + zentrale Sensibilisierung + autonome Dysregulation","Nur psychogener Schmerz","Neuropathischer Schmerz mit klarer Nervenläsion (CRPS Typ II)"],"r":1},{"k":"somatosensorik","f":"Welcher Neurotransmitter in Schicht I/II des Hinterhorns ist analgetisch?","a":["Glutamat (erregend)","Enkephalin + Endorphine (endogene Opioide); hemmen präsynaptisch C/Aδ-Faser-Freisetzung + postsynaptisch Projektionsneuron (via Gi-Rezeptoren); Basis für Opiat-Analgesie","GABA-A","Substanz P (algogen!)"],"r":1},{"k":"somatosensorik","f":"NAV1.8 und NAV1.9: Bedeutung für Schmerz?","a":["Nicht in Nozizeptoren","Nozizeptor-spezifische spannungsabhängige Na-Kanäle; NAV1.8 = tetrodotoxin-resistent; vermitteln Aktionspotentiale bei niedrigen Temperaturen + sauren pH; Ziel neuer Schmerz-Medikamente","Im Gehirn; kein Zusammenhang","Nur in Motoraxonen"],"r":1},{"k":"somatosensorik","f":"Viscerale vs. somatische Afferenzen: Unterschied in Schmerzqualität?","a":["Identisch","Viszeral: schlecht lokalisierbar, dumpf, krampfartig, vegetative Begleitsymptome (Übelkeit, Schwitzen); somatisch: gut lokalisierbar, scharf; unterschiedliche Afferenzdichte + Hinterhornverschaltung","Viszeral: immer scharf","Somatisch: immer dumpf"],"r":1},{"k":"somatosensorik","f":"Was ist Allodynie bei peripherer Neuropathie (Kontaktallodynie)?","a":["Keine Schmerzen trotz Nozizeptoren","Nicht-noxischer Reiz (z.B. leichtes Berühren durch Kleidung) löst starken Schmerz aus; sensibilisierte Aβ-Fasern leiten in 'nozizeptiven Modus'? oder zentrale Sensibilisierung; typisch bei Zoster (postherpetische Neuralgie)","Motorische Hyperreflexie","Erhöhte Schmerztoleranz"],"r":1},{"k":"somatosensorik","f":"Trigeminale Auralgie/Clusterkopfschmerz: Unterschied zu Trigeminus-Neuralgie?","a":["Identisch; nur Terminologie","Trigeminus-Neuralgie: kurze Attacken (<2min), elektrisch/einschießend, Trigger (Kauen/Sprechen); Clusterkopfschmerz: Stunden anhaltend, bohrender Schmerz periorbital, vegetative Begleitsymptome (Tränen, Rhinorrhoe, Horner), zirkadianer Rhythmus","Beide gleich behandelbar","Clusterkopfschmerz = Migräne-Variante"],"r":1},{"k":"somatosensorik","f":"Stochastische Resonanz bei Sensorik: Bedeutung?","a":["Rauschen stört sensorisches Signal immer","Kleines Rauschen kann Signal-Detektion VERBESSERN (subthreshold signals become detectable with optimal noise); Mechanismus für verbesserte Tastempfindung bei leichter Vibration; mögliche Therapienutzung","Nur akustisch relevant","Rein theoretisches Konzept"],"r":1},{"k":"hirnnerven","f":"N. oculomotorius (III): welcher Anteil ist pupillär (parasympathisch)?","a":["Alle Fasern","Pupillomotorische Fasern verlaufen OBERFLÄCH-LICH im N.III (Außenseite des Nervs) → bei externer Kompression (Aneurysma!) zuerst Mydriasis; Ischämie (diabetisch) schont oft Pupille (Mikrozirkulation zentral)!","Pupillomotorik im Innern des Nervs","Nur bei direktem Trauma"],"r":1},{"k":"hirnnerven","f":"Argyll-Robertson-Pupille: welche Verbindung ist unterbrochen?","a":["Afferente Pupillenbahn komplett","Verbindung von Area pretectalis zu Edinger-Westphal-Kern für Lichtreaktion ausgefallen; Nahreaktion-Bahn (über kortikale Umschaltung) ERHALTEN; Lues III; 'akkommodiert aber nicht auf Licht' = Umkehr des physiologischen Befunds","Efferente Bahn N.III","Retina ausgefallen"],"r":1},{"k":"hirnnerven","f":"Was ist das 'Adie-Syndrom'?","a":["Zentraler N.III-Ausfall","Postganglionäre parasympathische Denervierung des M. sphincter pupillae (Ggl. ciliare betroffen); TONISCHE Mydriasis (träge Konstriktion auf Licht, bessere langsame Konstriktion bei Nahreiz = Licht-Nah-Dissoziation); oft + Areflexie = Holmes-Adie-Syndrom","Kompletter N.III-Ausfall","Sympathikus-Läsion (= Horner)"],"r":1},{"k":"hirnnerven","f":"N. trigeminus V1 (N. ophthalmicus): was innerviert er sensibel?","a":["Untere Gesichtshälfte","Stirn, Oberlid, Nasenrücken, Kornea (Kornea-Reflex!), Sinus frontalis; tritt durch Fissura orbitalis superior; Herpes zoster ophthalmicus betrifft V1 → Blasen auf Stirn/Nasenspitze → Auge in Gefahr","Wange + Oberkiefer","Kinn + Unterkiefer"],"r":1},{"k":"hirnnerven","f":"Was ist das 'Eagle-Syndrom'?","a":["Riesenzell-Arteriitis","Verlängerter Processus styloideus (>2.5cm) → Kompression der A. carotis interna oder N.IX/N.X → einseitiger Halsschmerz + Schluckschmerzen + TIA; selten aber klinisch relevant","N.XII-Parese","Glossopharyngitis"],"r":1},{"k":"hirnnerven","f":"Kavernöser Sinus: welche Strukturen verlaufen dort?","a":["Nur venöses Blut","N.III + N.IV + N.V1 + N.V2 + N.VI (in der Wand!) + A. carotis interna (siphon) + sympath. Fasern; Kavernöser-Sinus-Thrombose → multiple HN-Ausfälle + Exophthalmus + Chemosis + Fieber","Nur N.II","Nur arteriell"],"r":1},{"k":"hirnnerven","f":"Was ist die 'Wechselblickparese' (Konjugierte Lähmung)?","a":["N.VI-Läsion allein","Horizontale Blickparese durch PPRF-Läsion: BEIDE Augen können nicht zur IPSILATERALEN Seite blicken (N.VI + kontralateraler N.III via MLF betroffen); DD: kontralaterale Frontalhirn-Läsion → Augen schauen ZUR Läsion (zur gesunden Seite)","N.III-Läsion","Vestibuläre Störung"],"r":1},{"k":"hirnnerven","f":"Fazialisparese + Hyperakusis: warum?","a":["N.VIII-Mitbeteiligung","M. stapedius (läuft durch N.VII) ist gelähmt → kein Dämpfungsreflex für Stapes → Schall wird unvermindert weitergeleitet → Töne klingen viel lauter als normal","Mittelohrbeteiligung","Innenohrbeteiligung"],"r":1},{"k":"hirnnerven","f":"Was ist das Ramsay-Hunt-Syndrom?","a":["Bakterielle Otitis media","Herpes zoster oticus: Reaktivierung VZV im Ggl. geniculi → Fazialisparese + schmerzhafter Ausschlag am Ohr/Gehörgang + ev. N.VIII-Beteiligung (Tinnitus, Hörminderung, Schwindel); schlechtere Prognose als Bell-Lähmung!","N.V-Neuralgie","Labyrinthinfarkt"],"r":1},{"k":"hirnnerven","f":"N. accessorius (XI): Prüfung klinisch?","a":["Zungendeviation testen","M. sternocleidomastoideus: Kopf gegen Widerstand drehen (ipsilateral); M. trapezius: Schulter gegen Widerstand heben; Läsion: hängende Schulter + Kopfrotation zur gesunden Seite schwierig","Würgreflex testen","Gaumensegel testen"],"r":1},{"k":"hirnnerven","f":"'Weber-Test' vs. 'Rinne-Test': was prüfen sie?","a":["Beide nur Nervenleitgeschwindigkeit","Weber: Stimmgabel auf Schädelmitte → bei einseitiger Schallleitungsschwerhörigkeit: besser auf kranker Seite; bei einseitiger Schallempfindungsschwerhörigkeit: besser auf gesunder Seite. Rinne: Knochen vs. Luftleitung","Beide nur Luftleitung","Beide vestibulär"],"r":1},{"k":"hirnnerven","f":"Was ist der Unterschied zwischen Dysarthrie und Aphasie?","a":["Identisch","Dysarthrie: gestörte ARTIKULATION (Sprechmotor; N.VII, N.X, N.XII, Zerebellum) bei intakter Sprachfähigkeit; Aphasie: gestörte SPRACHE selbst (Semantik, Grammatik, Verstehen; Broca/Wernicke-Areal)","Dysarthrie = Hörstörung","Aphasie = Lähmung"],"r":1},{"k":"hirnnerven","f":"Broca- vs. Wernicke-Aphasie: Hauptunterschied?","a":["Beide nicht-flüssig","Broca (Area 44/45, fronto-lateral): nicht-flüssig, Agrammatismus, Verstehen erhalten, Patient frustriert; Wernicke (Area 22, temporo-lateral): flüssig (Paraphasien, Jargon), Verstehen GESTÖRT, Patient often anosognostisch","Broca = flüssig; Wernicke = nicht-flüssig","Beide flüssig"],"r":1},{"k":"hirnnerven","f":"Was ist eine 'globale Aphasie'?","a":["Leichte Sprachstörung","Alle Sprachfunktionen schwer beeinträchtigt (Produktion + Verstehen + Lesen + Schreiben); bei großem MCA-Infarkt (Broca + Wernicke + Verbindungsfasern); schlimmste Aphasie-Form","Nur Schriftsprache","Nur Verstehenstörung"],"r":1},{"k":"hirnnerven","f":"Schluckakt: Steuerung durch welche Hirnnervenkerne?","a":["N.VII + N.VIII","N.IX + N.X (Ncl. ambiguus) + N.XII; kortikale Kontrolle (Inselrinde + motorischer Kortex); Hirnstamm-Schäden → Dysphagie + Aspirations-Pneumonie!","N.V + N.VI","Nur N.X"],"r":1},{"k":"hippocampus","f":"Was ist Konsolidierung und wie lange dauert sie?","a":["Sofortige Gedächtnisbildung ohne Schlaf","Stabilisierung von Gedächtnisspuren: kurzfristig (Minuten-Stunden: protein-synthese-unabhängige frühe LTP); langfristig (Tage-Jahre: Schlaf-abhängiger Transfer Hippocampus→Neokortex); Vollständige Konsolidierung semantisch: Jahre!","Nur im REM-Schlaf, 30 Minuten","Nur bei Kindern"],"r":1},{"k":"hippocampus","f":"Was ist retrogrades vs. anterogrades Amnesie?","a":["Identisch","Retrograd: Gedächtnisverlust für BEREITS gespeicherte Erinnerungen (vor Trauma); anterograd: Unfähigkeit, NEUE Erinnerungen zu bilden (nach Trauma); H.M. hatte beide, anterograde schwerer!","Retrograd = nach Trauma; anterograd = davor","Retrograd = Fakten; anterograd = Episoden"],"r":1},{"k":"hippocampus","f":"Korsakoff-Syndrom: Ursache + Amnesie-Typ?","a":["Alkohol allein","Thiaminmangel (Vit.B1) → Wernicke-Enzephalopathie (Opthalmoparese + Ataxie + Verwirrtheit) → unbehandelt → Korsakoff (chron. Amnesie); Confabulation (unbewusste Falscherinnerungen)!; Schaden: Corpus mammillare + Thalamus ncll. anteriores","Alzheimer-Frühform","Psychogen"],"r":1},{"k":"hippocampus","f":"Transiente globale Amnesie (TGA): was ist das?","a":["Chronische Amnesie","Plötzliche reversible schwere Amnesie (anterograd + retrograd) für <24h; typisch mittelalte Patienten nach körperlicher/psychischer Belastung; immer wiederkehrende Fragen; MRI: hippocampale DWI-Läsion; gutartig, rezidiviert selten","Epileptischer Anfall","Schlaganfall-Äquivalent"],"r":1},{"k":"hippocampus","f":"Limbisches Enkodieren: was verstärkt Gedächtnis?","a":["Nur Wiederholung","Emotionale Bedeutung + Amygdala-Aktivierung (Noradrenalin bei Stress → Amygdala stimuliert Hippocampus) → stärkeres Einprägen; 'flashbulb memories' bei emotionalen Ereignissen; auch REM-Schlaf verarbeitet emotionale Inhalte","Nur das Visuell-Räumliche","Nur Schlaf"],"r":1},{"k":"hippocampus","f":"CREB (cAMP response element-binding protein): Rolle bei Gedächtnis?","a":["Strukturprotein der Synapse","Transkriptionsfaktor; durch PKA phosphoryliert (nach cAMP-Anstieg); aktiviert IEGs (Arc, BDNF, Fos) → späte LTP → langfristiges Gedächtnis; Hemmung von CREB → kein Langzeitgedächtnis (in Tierversuchen)","Glutamatrezeptor","Neurotransmitter"],"r":1},{"k":"hippocampus","f":"Was ist das 'Bindungsproblem' im Gedächtnis?","a":["Gedächtnisverlust bei Demenz","Wie werden verteilte kortikale Informationen (Farbe, Form, Klang, Geruch) zu einer kohärenten Erinnerung gebunden? Hippocampus als 'Indexstruktur' verknüpft kortikale Repräsentationen; nach Konsolidierung: direkter kortikaler Zugriff","Problem bei Bindung von Proteinen","Synaptische Ermüdung"],"r":1},{"k":"hippocampus","f":"Dentate gyrus adulte Neurogenese: was fördert sie?","a":["Alkohol, Stress, Alter fördern alle","Aerobe Bewegung (BDNF↑!), Lernen, SSRI-Antidepressiva, Umgebungsreichtum; hemmt: Alkohol, chronischer Stress (Cortisol), Schlafmangel, Alter; klinische Relevanz umstritten","Nichts beeinflusst sie","Nur in Kindheit aktiv"],"r":1},{"k":"hippocampus","f":"NMDA-Rezeptor: welche Untereinheiten und Entwicklung?","a":["Nur NR2A immer","NR2B dominant in Kindheit → langsamere Kinetik → 'offeneres Zeitfenster' für Koinzidenz-Detektion → besseres Lernen im Kindesalter; im Erwachsenen: NR2A dominant → schneller; NR1 immer essentiell (obligatorische Untereinheit)","NR1 fehlt bei Erwachsenen","Keine Untereinheiten-Entwicklung"],"r":1},{"k":"hippocampus","f":"Was ist LTP-Induktions-Protokoll 'theta burst stimulation' (TBS)?","a":["Niedrigfrequenz (1 Hz)","Kurze Hochfrequenz-Bursts im theta-Rhythmus (4-8 Hz); imitiert physiologische theta-Aktivität des Hippocampus; sehr effektive LTP-Induktion; auch therapeutisch: TMS-Protokoll für kognitive Enhancement","Einzelner starker Puls","Gleichstrom-Stimulation"],"r":1},{"k":"neuro_erkrankungen","f":"Was ist das 'klinisch isolierte Syndrom' (CIS) bei MS?","a":["Chronische MS-Form","Erstes demyelinisierendes Ereignis (<24h anhaltend); noch keine zeitliche Dissemination; MRI kann bereits raumzeitliche Dissemination zeigen → dann schon MS-Diagnose (McDonald 2017); Behandlungsbeginn früh empfohlen","Remittierender Verlauf","Benigne MS-Variante"],"r":1},{"k":"neuro_erkrankungen","f":"Status epilepticus: First-Line Therapie?","a":["Phenytoin i.v. sofort","Benzodiazepin i.v. (Lorazepam oder Diazepam!) + Sicherung Atemweg + O2; wenn kein i.v.-Zugang: Midazolam bukkal/intranasal; Second-line: Levetiracetam oder Valproat oder Phenytoin; Third-line: Anästhesie (Propofol/Thiopental)","Valproat als Erstmaßnahme","Warten und beobachten"],"r":1},{"k":"neuro_erkrankungen","f":"Guillain-Barré-Syndrom (GBS): Pathomechanismus?","a":["Axonale Degeneration primär","Autoimmun-Polyneuropathie; meist nach Infektion (Campylobacter, CMV, EBV, Zika) → molekulares Mimikry → AK gegen periphere Myelinproteine (Anti-GM1, Anti-GQ1b bei MFS-Variante); aufsteigende schlaffe Lähmung + Areflexie; autonome Instabilität; IVIG oder Plasmapherese","Genetische Ursache","ZNS-Erkrankung"],"r":1},{"k":"neuro_erkrankungen","f":"Was ist das Miller-Fisher-Syndrom?","a":["Schwere ALS-Variante","GBS-Variante: Ophthalmoplegia + Ataxia + Areflexia (OAA-Trias); Anti-GQ1b-AK; N.III/IV/VI-Parese bilateral + Kleinhirnataxie + Areflexie; meist selbstlimitierend, gute Prognose","MS-Akutschub","Myasthenie-Variante"],"r":1},{"k":"neuro_erkrankungen","f":"Antiepileptika-Mechanismen: was macht Carbamazepin?","a":["Verstärkt GABAerge Hemmung","Na-Kanal-Blocker (use-dependent); vermindert repetitive Neuronen-Entladungen; auch gegen Trigeminus-Neuralgie; Interaktionen (CYP3A4-Induktor!); teratogen","Ca-Kanal-Blocker","NMDA-Blocker"],"r":1},{"k":"neuro_erkrankungen","f":"Myasthene Krise: was ist das und Therapie?","a":["Chronische Myasthenie-Exazerbation","Lebensbedrohliche Verschlechterung mit Atemlähmung; Auslöser: Infektion, Medikamente (Aminoglykoside, β-Blocker, Chloroquin!); Therapie: IVIg oder Plasmapherese + Beatmung; KEINE Neostigmin-Hochdosis (kann cholinergische Krise auslösen)!","Cholinesterasehemmer overdosis","Autoimmun-Enzephalitis"],"r":1},{"k":"demenz","f":"Biomarker-Staging bei AD (A/T/N System): was bedeutet es?","a":["Anatomisches/Topographisches/Neuroradiologisches System","A (Amyloid) = Amyloid-PET oder Aβ42 im Liquor; T (Tau) = Tau-PET oder pTau im Liquor; N (Neurodegeneration) = FDG-PET Hypometabolismus oder Atrophie oder Gesamt-Tau; ermöglicht pre-symptomatische Diagnose!","Alterskorrigiertes/Training/Neuro","Aktivierung/Transmission/Neuroplastizität"],"r":1},{"k":"demenz","f":"Vascular cognitive impairment (VCI): was unterscheidet es von AD?","a":["Identisch; keine Unterscheidung möglich","Stufenweiser Verlauf (nach Infarkten); prominente Exekutivstörung + Gangstörung früh; MRI: Leukoaraiose + lakunäre Infarkte; Amyloid-PET negativ; Blutdruck-Kontrolle verlangsamt Progression!; oft mit AD kombiniert (gemischte Demenz)","Immer rascher Verlauf","Immer Gedächtnis als erstes"],"r":1},{"k":"demenz","f":"Was ist die Prion-Erkrankung Creutzfeldt-Jakob-Krankheit (CJD)?","a":["Virusinfektion","Prionenerkrankung: fehlgefaltetes PrPsc akkumuliert → spongiforme Enzephalopathie; sporadisch (80%): rasch progrediente Demenz + Myoklonien + EEG (periodische scharfe Wellen) + MRI DWI (Cortical ribboning, Basalganglien); tödlich in Monaten!","Autoimmunenzephalitis","Genetische Demenz (häufig)"],"r":1},{"k":"demenz","f":"Anti-NMDA-Rezeptor-Enzephalitis: wer ist betroffen und Symptome?","a":["Alte Männer; Gedächtnisverlust","Meist junge Frauen; oft Ovarial-Teratom (enthält neuronales Gewebe → AK-Induktion); Symptome: psychiatrische Prodrom (Psychose, Angst) → Bewusstseinsstörung → autonome Instabilität + epileptische Anfälle + orofaziale Dyskinesien; reversibel bei Behandlung (Immuntherapie + Tumor-Entfernung)","Mittelalte Männer; rein motorisch","Kinder; Verhaltensänderung"],"r":1},{"k":"haut","f":"Was ist der 'tight junction' der Epidermis und wo?","a":["Zwischen Hornzellen (Str. corneum)","Stratum granulosum: Tight Junctions zwischen Granulozellen → eigentliche Permeabilitätsbarriere für Wasser und Ionen; plus Lipidverschluss darunter → zwei-stufige Barriere","Zwischen Melanozyten","Zwischen Dermis und Epidermis"],"r":1},{"k":"haut","f":"Was ist 'transepidermaler Wasserverlust' (TEWL) und klinische Bedeutung?","a":["Schweiß-Sekretion","Passiver Wasserdampfverlust durch Epidermis (nicht Schweiß!); Maß für Barrierefunktion; erhöht bei Neurodermitis, Psoriasis, trockener Haut; Grundlage für Feuchtigkeitspflege; Ceramide in Cremes reduzieren TEWL","Kapillarer Wasseraustausch","Lymph-Abfluss"],"r":1},{"k":"haut","f":"Epidermale Wundheilung: Phasen?","a":["Direkte Vernarbung ohne Proliferation","Primär intention: Blutstillung (Thrombozyten, Fibrin) → Entzündung (Neutrophile, Makrophagen) → Proliferation (Fibroblasten, Angiogenese, Keratinozyten-Migration) → Remodelling (Kollagen-Vernetzung, Narbe); Epidermis regeneriert komplett ohne Narbe bei dünnen Defekten!","Nur Narbenbildung","Nur durch Stammzellen im Knochenmark"],"r":1},{"k":"haut","f":"Melanom: welche Zellen und Metastasierungsmuster?","a":["Aus Keratinozyten","Malignes Melanom aus MELANOZYTEN (Neuralleistenzellen!); früh hämatogen + lymphogen metastasierend (Wächter-Lymphknoten!); ABCDE-Regel: Asymmetry, Border, Color, Diameter>6mm, Evolution; UV-Schutz wichtigste Prävention","Aus Fibroblasten","Aus Merkel-Zellen"],"r":1},{"k":"haut","f":"Plattenepithelkarzinom der Haut: Vorstufe?","a":["Basalzellkarzinom","Aktinische Keratose (Carcinoma in situ); UV-Schaden → Keratinozyten-Atypien; unterschied zu Basaliom: echte Malignität mit Metastasierungspotential! (wenn invasiv)","Nävuszellnävus","Keine Vorstufe bekannt"],"r":1},{"k":"haut","f":"Collagen Typen in der Haut: welcher wo?","a":["Nur Kollagen I überall","Kollagen I (Str. reticulare = Hauptmasse, Zugfestigkeit); Kollagen III (Str. papillare + fetale Wundheilung = Granulationsgewebe!); Kollagen IV (Basalmembran); Kollagen VII (Ankerfibrillen, Lamina densa → Dermis)","Nur Kollagen IV","Kollagen II = Haut"],"r":1},{"k":"haut","f":"Elastin in der Haut: Funktion und Schicksal im Alter?","a":["Keine Funktion","Gibt Haut Elastizität (Rückkehr nach Dehnung); im Alter: Elastin fragmentiert + Quervernetzung (AGE = advanced glycation end-products) → Elastizitätsverlust → Falten; UV beschleunigt Abbau (Aktinoelastose)","Zunahme von Elastin im Alter","Elastin nur im Fetus"],"r":1},{"k":"haut","f":"Nagelentwicklung: aus welcher embryonalen Schicht und Wachstumsrate?","a":["Aus Dermis (Mesoderm)","Aus Epidermis (Ektoderm)! Nailbed + Matrix aus Str. basale; ~3mm/Monat (Finger schneller als Zehen!); Nagel = verhorntes Epidermis-Derivat; Nailmatrix unter Nagelwurzel (Monula)","Aus Neuralleiste","Identisch wie Haare aber langsamer"],"r":1},{"k":"haut","f":"Was ist Atopische Dermatitis (Neurodermitis): Pathomechanismus?","a":["Nur äußerliche Allergie","Gestörte Hautbarriere (Filaggrin-Mutation!) + TH2-Überreaktion + IgE↑ + Microbiom-Dysbiose (Staphylokokken dominieren); genetisch + Umwelt; Teufelskreis: Barrierestörung → Allergen-Penetration → Sensibilisierung → Entzündung → mehr Barrierestörung","Nur psychosomat.","Rein bakteriell"],"r":1},{"k":"haut","f":"Psoriasis (Schuppenflechte): Pathomechanismus?","a":["Virus-Infektion","T-Zell-medierte Autoimmunerkrankung; Th1/Th17-Aktivierung → TNF-α + IL-17 + IL-23 → Keratinozyten-Hyperproliferation (Turnover auf 4-7 Tage statt 28!) → Schuppung; genetisch + Trigger (Streptokokken, Stress, Medikamente); Biologika: Anti-IL-17, Anti-IL-23","Pilzinfektion","Allergisch-IgE-vermittelt"],"r":1},{"k":"geschmack","f":"Umami (5. Geschmacksqualität): Rezeptor und biologische Bedeutung?","a":["T2R-GPCR (wie bitter)","T1R1+T1R3 heterodimer GPCR; Liganden: Glutamat + Inosinat + Guanylat; evolutionäre Bedeutung: Proteinnachweis in Nahrung; Glutamat in Fleisch, Käse, Tomaten; Synergismus: MSG + Inosinat = sehr starker Umami-Reiz","Ionenkanal direkt","ENaC wie salzig"],"r":1},{"k":"geschmack","f":"Supertaster: was ist das?","a":["Person mit Anosmie","Mensch mit überdurchschnittlich vielen Pilzpapillen + höherer TRPV1-Dichte (Capsaicin-sensitiv!); Bitterwahrnehmung sehr stark; TAS2R38-Genotyp beeinflusst; ca. 25% der Bevölkerung; essen weniger Gemüse","Nur für Süßes sensitiv","Sensorisch deprivierte Person"],"r":1},{"k":"geschmack","f":"Gustatorisches kortikales Areal: primär und sekundär?","a":["Nur in Frontallobus","Primär: Operculum frontale + Insula anterior (S1 entsprechend); Sekundär: Orbitofrontaler Kortex (multimodale Geschmacks-Geruchs-Integration = Flavour!); Thalamus VPM als Relais","Nur Okzipitallappen","Nur Temporallappen"],"r":1},{"k":"geschmack","f":"Was ist Ageusie und Dysgeusie?","a":["Identisch","Ageusie = kein Geschmack; Dysgeusie = verzerrter/unangenehmer Geschmack; nach COVID-19 häufig Dysgeusie als Langzeitfolge; auch bei Medikamenten (ACE-Hemmer: Metallic taste!), Zink-Mangel, Chemotherapie, Zungenkrebs","Geruchsstörungen","Schluckschwierigkeiten"],"r":1},{"k":"geschmack","f":"Einfluss von Hunger auf Geschmackswahrnehmung?","a":["Hunger hat keinen Einfluss","Ghrelin (Hunger-Hormon) sensitisiert Geschmacksknospen + Riechsystem; Sättigung durch Leptin + GLP-1 desensibilisiert; sensorisch-spezifische Sättigung: Satt für Pommes, aber noch Platz für Dessert (verschiedene Modalitäten)","Nur Geruch beeinflusst","Nur kognitive Wirkung"],"r":1},{"k":"geschmack","f":"Orthonasal vs. retronasal Riechen: Unterschied?","a":["Identisch","Orthonasal: Luft durch Nase von vorne (beim Schnuppern = aktive Inhalation); retronasal: Luft aus Mund nach hinten durch Choanen zur Regio olfactoria (beim Essen + Kauen → Aroma = wichtigster Flavor-Anteil!); Geschmack + Retronasal = Flavor","Beide über Mund","Nur retronasal für Nahrung"],"r":1},{"k":"auge_anatomie","f":"Kammerwasser-Zirkulation: was passiert bei primärem Offenwinkelglaukom?","a":["Kammerwasser wird zu viel produziert","Abfluss durch Trabekelwerk/Schlemm-Kanal verlangsamt (ohne anatomisch sichtbaren Winkelblock); IOP schleichend↑; N.opticus Druck-Atrophie; häufig + heimtückisch (symptomlos lange); Therapie: Prostaglandin-Analoga (Abfluss↑) oder β-Blocker (Produktion↓)","Linse blockiert Pupille","Glasköper quillt auf"],"r":1},{"k":"auge_anatomie","f":"Was ist Anisokorie und wann ist sie pathologisch?","a":["Immer pathologisch","Asymmetrie der Pupillenweite; physiologisch: bis 1mm Unterschied toleriert; pathologisch: bei N.III-Läsion (Mydriasis größer), Horner (Miosis), Medikamente, Adie-Pupille; Swinging flashlight test zeigt ob RAPD vorhanden","Immer harmlos","Nur bei Dunkeltheit pathologisch"],"r":1},{"k":"auge_anatomie","f":"Makuladegeneration (AMD): was unterscheidet trockene von feuchter Form?","a":["Identisch; nur Schweregrad","Trockene AMD: Drusen (Ablagerungen) + RPE-Atrophie; langsam; kein Behandlungsbedarf; feuchte AMD: Neoangiogenese (subretinale Gefäße, VEGF↑) → rasche zentrale Visusminderung; Anti-VEGF-Injektionen (Ranibizumab, Bevacizumab) = Behandlung!","Trockene = gefährlicher","Feuchte = häufiger"],"r":1},{"k":"auge_anatomie","f":"Diabetische Retinopathie: nicht-proliferativ vs. proliferativ?","a":["Identisch","Nicht-proliferativ: Mikroaneurysmen + Punktblutungen + Cotton-wool-spots (Nervenfaserinfarkte) + Exsudate; proliferativ: Neoangiogenese (VEGF bei Ischämie!) → Blutungen in Glaskörper + Netzhautablösung; Laserkoagulation + Anti-VEGF","Proliferativ = immer harmlos","Nicht-proliferativ = seltener"],"r":1},{"k":"auge_anatomie","f":"Was ist ein Skotom?","a":["Verengung des Gesichtsfeldes peripher","Lokalisierter Ausfall im Gesichtsfeld; absolutes Skotom (nichts gesehen) vs. relatives (nur vermindertes Sehen); blinder Fleck (Papille) = physiologisches Skotom; zentral (Macula betroffen) vs. peripher","Alles unscharfe Sehen","Doppelbilder"],"r":1},{"k":"auge_anatomie","f":"Retinitis pigmentosa: was degeneriert und klinisches Bild?","a":["Zapfen zuerst → zentrale Blindheit zuerst","Stäbchen (und dann Zapfen) degenerieren; Knochenkörperchen-Pigmentierung periphere Retina; NACHTBLINDHEIT + Gesichtsfeldeinengung (Tunnelblick) → zentrale Blindheit; X-chromosomal oder AD oder AR; viele Gene (Rhodopsin-Mutationen!)","Nur Ganglienzellen","Pigmentepithel primär"],"r":1},{"k":"auge_anatomie","f":"Kontaktlinsen und Hornhaut: warum O2-Versorgung kritisch?","a":["Hornhaut ist gut durchblutet","Hornhaut ist GEFÄSSFREI → O2-Versorgung hauptsächlich durch Diffusion aus Tränenfilm (Luft) + Kammerwasser; bei Kontaktlinsen: O2-Barriere → Hypoxie → Neoangiogenese in Hornhaut + Risiko für Infektionen (Akanthamöben bei Schwimmbad-Trägerinnen!)","O2 aus Blut durch Iris","O2-Versorgung unrelevant"],"r":1},{"k":"auge_anatomie","f":"Was ist Presbyopie auf Linsenebene?","a":["Hornhautdeformation","Linse verliert Elastizität durch Proteindenaturierung (α-Crystallin-Verlust → Kernsklerose); Kapsel kann Linse nicht mehr verformen → Akkommodationsbreite↓; ab ~45 Jahre; Lesen mit Lesebrille (Sammellinse); keine Medikamenten-Therapie","Ziliarmuskel-Lähmung","Trocken Auge"],"r":1},{"k":"auge_anatomie","f":"Katarakt (Grauer Star): Ursachen und Behandlung?","a":["Laser-Operation","Trübung der Linse; Ursachen: Alter (80%), UV, Kortikosteroide, Diabetes (Sorbitol-Akkumulation), Trauma, kongenital (Röteln!); keine medikamentöse Therapie! → operative Linsenentfernung + IOL-Implantation (Standardeingriff weltweit)","Nur genetisch","Hornhauttrübung (verwechselt)"],"r":1},{"k":"auge_anatomie","f":"Strabismus (Schielen): Folge bei Kindern wenn unbehandelt?","a":["Nur kosmetisches Problem","Amblyopie (Schwachsichtigkeit)! Bilder aus schielndem Auge werden unterdrückt → funktionelle Blindheit durch Nicht-Benutzung; kritische Periode ~0-7 Jahre; Behandlung: Abkleben gesundes Auge + Brille/Prismen + ev. Op; nach kritischer Periode irreversibel!","Nur Doppelbilder","Netzhautablösung"],"r":1},{"k":"augenentwicklung","f":"Kritische Periode der visuellen Entwicklung: was und wann?","a":["Lebenslang gleich lernfähig","~0-7 Jahre (besonders kritisch 0-3J); Entwicklung okulärer Dominanzsäulen + binokulares Sehen; Störung (Strabismus, Katarakt) → Amblyopie durch fehlende Erfahrung; Occlusion-Therapie nur in kritischer Periode effektiv!","Nur pränatal","Nach der Pubertät abgeschlossen"],"r":1},{"k":"augenentwicklung","f":"Reye-Syndrom und N.VI: warum N.VI oft als erstes betroffen?","a":["Weil N.VI am empfindlichsten","N.VI hat langen intrakraniellen Verlauf ohne Schutz → bei erhöhtem ICP (Hirndruck) wird N.VI gegen Felsbein angepresst + gedehnt → Falschlokalisationszeichen! (Nicht immer N.VI-Kern betroffen)","Weil N.VI am dünnsten","Direkter Kontakt mit Hirndruck"],"r":1},{"k":"augenentwicklung","f":"Smooth pursuit: was ist physiologisches Maximum und was passiert bei Überschreitung?","a":["Keine Grenzen","Maximum ~30°/sec; bei schnellerem Ziel: Smooth Pursuit bricht ab → Catch-up-Sakkaden; reduzierter Smooth Pursuit bei Kleinhirnerkrankungen, Medikamenten (Sedativa!), MS","Maximum 500°/sec","Keine physiologische Grenze"],"r":1},{"k":"augenentwicklung","f":"Opsoklonus-Myoklonus: was ist das?","a":["Vestibulärer Nystagmus","Chaotische konjugierte Augenbewegungen in alle Richtungen + Myoklonien; paraneoplastisch (Neuroblastom beim Kind, SCLC bei Erwachsenen, Brust-CA; Anti-Ri, Anti-Hu AK) oder post-infektiös; Kleinhirn/Hirnstamm-Dysfunktion","Monokuläre Bewegungsstörung","Nur bei Vergiftungen"],"r":1},{"k":"augenentwicklung","f":"Okulomotorische Apraxie: Definition?","a":["Augenmuskellähmung","Unfähigkeit, Willkür-Sakkaden zu initiieren bei intakten reflexiven Augenbewegungen (OKN, VOR erhalten); Frontalhirn-Läsion (FEF) oder Balint-Syndrom; Kopfimpulse als Kompensationsstrategie bei kongenitaler Form","Konjugierte Blickparese","Vertikaler Nystagmus"],"r":1},{"k":"vestibular","f":"Utrikulusbefund bei Rücken- vs. Bauchlagedifferenz?","a":["Identisch","Macula utriculi ist HORIZONTAL → detektiert Gravitationsvektor bei aufrechter Haltung; bei Rückenlage vs. Bauchlage ändert sich relative Ausrichtung zur Gravity → unterschiedliche Haarzellen-Aktivierung; für Lage im Raum!","Macula sacculi für Lagedifferenz","Bogengänge für Lagedifferenz"],"r":1},{"k":"vestibular","f":"Vestibuläre Migräne: Symptome + Häufigkeit?","a":["Klassische Migräne ohne vestibuläre Symptome","Häufigste Ursache episodischen Schwindels! Vertigo-Attacken (min bis Stunden) ± Kopfschmerz ± Photophobie; Kriterien: mindestens 5 Episoden, vestibulär + 50% mit Migräne-Kopfschmerz; Behandlung wie Migräne-Prophylaxe","Immer schwere Hörminderung","Immer BPPV-ähnlich"],"r":1},{"k":"vestibular","f":"Akute vestibuläre Neuritis: Ursache + Therapie?","a":["Bakterielle Mittelohrentzündung","Meist postuliiert virale Ursache (VZV-Reaktivierung im N.vestibularis?); plötzlicher starker Schwindel mit Nausea/Erbrechen + Nystagmus + Fallneigung zur kranken Seite; KEIN Hörverlust! (DD Labyrinthinfarkt); Therapie: Kortikosteroide + Antiemetika + frühe Mobilisierung","Bakt. Labyrinthitis","Positionale Manipulation"],"r":1},{"k":"vestibular","f":"HINTS-Exam: was ist das und wann angewendet?","a":["Hörtest für Lärmempfindlichkeit","Head Impulse + Nystagmus direction + Test of Skew; unterscheidet periphere von zentralen Schwindelursachen; bei akutem Schwindel + Nausea; HINTS gegen zentral: normales HIT (kein Saccade) + Richtungswechselnder Nystagmus + Skew deviation → ZNS-Läsion! Empfindlicher als MRI in ersten 48h!","Haarzell-Prüfung","Hörverlust-Diagnostik"],"r":1},{"k":"vestibular","f":"Zentrale vs. periphere Ursache bei Schwindel: welche Zeichen für zentral?","a":["Schwindel immer zentral wenn schwer","Zentral: richtungsverändernder Nystagmus + vertikaler Nystagmus + keine Hemmung durch Fixation + neurologische Begleitsymptome (Diplopsie, Dysphagie, Ataxie); peripher: ein-direktionaler Nystagmus + stark durch Fixation hemmbar + oft einseitiger Hörverlust","Peripherer Schwindel immer schlimmer","Zentral = nur bei Trauma"],"r":1},{"k":"vestibular","f":"Efferente Innervation der Haarzellen: woher und wozu?","a":["Keine efferente Innervation","Olivokokleäres Bündel (OCB, aus Ncl. olivaris superior) → ÄHZ; hemmt ÄHZ-Kontraktion (Prestin) bei Lärm → schützt! → Kontralaterales Ohr verstärkt wenn Aufmerksamkeit dort; kann Cochleaamplifikation modulieren","Nur afferente Innervation","Efferenz aus Hypothalamus"],"r":1},{"k":"vestibular","f":"Audiogramm: was bedeutet Schalleitungsschwerhörigkeit vs. Schallempfindungsstörung?","a":["Identisch im Audiogramm","Schalleitung: Luftleitung schlechter als Knochenleitung (air-bone gap!); Ursachen: Cerumen, Otitis media, Otosklerose; Schallempfindung: Luft- UND Knochenleitung gleich schlecht (kein air-bone gap); Ursachen: Haarzell-Schaden, N.VIII, Koklea","Nur Knochenleitung beeinträchtigt","Beide identisch dargestellt"],"r":1},{"k":"vestibular","f":"Otosklerose: was ist das?","a":["Entzündung des Innenohres","Abnorme Knochenumbauprozesse im Bereich der Stapesfußplatte → Fixierung des Stapes → Schalleitungsschwerhörigkeit progressiv; typisch: junge Frauen (Schwangerschaft verschlechtert!); Carhart-Kerbe im Audiogramm; Behandlung: Stapedektomie/Stapedotomie","Tumour des N.VIII","Trommelfell-Ruptur"],"r":1},{"k":"vestibular","f":"Haarzell-Tip-Links: Zusammensetzung und Funktion?","a":["Elastische Proteine die Energiespeicher","Cadherin-23 + Protocadherin-15; verbinden Spitzen benachbarter Stereozilien; mechanosensitive Ionenkanäle durch Tip-Links geöffnet bei Auslenkung; Mutationen → Usher-Syndrom (Taubheit + Retinitis pigmentosa!)","Myosin-Filamente","Aktin-Bündel der Stereozilien"],"r":1},{"k":"vestibular","f":"Zytocochleagramm: was zeigt es?","a":["Audiogramm mit Frequenzen","Tonotopische Kartierung des Haarzellverlustes im Corti-Organ; zeigt welche Frequenzbereiche (Basilarmembran-Positionen) degeneriert sind; wichtig für Cochlea-Implantat-Planung (Elektrode an noch aktive Ganglienzellen)","Schallleitungs-Messung","Endocochleäres Potential"],"r":1},{"k":"vestibular","f":"Cochlea-Implantat: Prinzip + Voraussetzung?","a":["Schallverstärker im Ohr","Direktes elektrisches Stimulieren der Spiralganglion-Neurone (N. coc function $(s){return document.querySelector(s)}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e}
function wrap(){return $('#wrap')}
function setActive(id){['btn-ue','btn-qu'].forEach(b=>$('#'+b).classList.remove('active'));if(id)$('#'+id)&&$('#'+id).classList.add('active')}
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function themaById(id){return TH.find(t=>t.id===id)}
